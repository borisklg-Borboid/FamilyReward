<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAMILY SQUAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --common: #b1b1b1; --uncommon: #43c034; --epic: #b233f0; --legendary: #f0ad1d; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .fortnite-font { font-weight: 800; text-transform: uppercase; letter-spacing: -0.01em; }
        .card-common { background: linear-gradient(135deg, #374151 0%, #111827 100%); border-top: 4px solid var(--common); }
        .card-uncommon { background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); border-top: 4px solid var(--uncommon); }
        .card-epic { background: linear-gradient(135deg, #581c87 0%, #2e1065 100%); border-top: 4px solid var(--epic); }
        .card-legendary { 
            background: linear-gradient(135deg, #78350f 0%, #451a03 100%); border-top: 4px solid var(--legendary); 
            position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(240, 173, 29, 0.4);
        }
        .card-legendary::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: rotate(45deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { margin-left: -100%; } 100% { margin-left: 100%; } }
        .card-completed, .card-expired, .card-upcoming { background: #1e293b !important; border-top: 4px solid #475569 !important; opacity: 0.6; filter: grayscale(1); }
        .tab-active { background-color: #2563eb !important; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        [v-cloak] { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="min-h-screen flex flex-col max-w-md mx-auto pb-24 px-4">
        
        <div v-if="!user" class="flex-1 flex flex-col items-center justify-center space-y-8 py-12">
            <div class="text-center">
                <h1 class="fortnite-font text-5xl italic tracking-tighter mb-2">SQUAD HOME</h1>
                <p class="text-blue-400 font-bold uppercase tracking-[0.3em] text-xs">Battle Pass System</p>
            </div>
            <button @click="login" class="w-full bg-white text-black py-4 rounded-2xl fortnite-font text-sm shadow-xl active:scale-95 transition-all">LOG IN MET GOOGLE</button>
        </div>

        <template v-if="user && familyId">
            <header class="py-6 flex justify-between items-center">
                <div class="flex flex-col">
                    <h1 class="fortnite-font text-2xl italic tracking-tighter italic">FAMILY SQUAD</h1>
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">{{ familyName }}</p>
                </div>
                <button @click="logout" class="text-slate-500 text-[10px] font-black bg-slate-800 px-3 py-1 rounded-lg uppercase">Quit</button>
            </header>

            <section class="mb-6 space-y-4">
                <div @click="role !== 'admin' ? showBalanceActionModal = true : null" 
                     class="bg-slate-900/80 p-6 rounded-[2rem] border border-white/5 shadow-2xl transition-all"
                     :class="role !== 'admin' ? 'cursor-pointer active:scale-95' : ''">
                    <div class="flex justify-between items-start mb-2">
                        <p class="fortnite-font text-[10px] text-yellow-400 tracking-widest">{{ role === 'admin' ? 'Total Squad Credits' : 'Mijn Goudvoorraad' }}</p>
                        <p v-if="role !== 'admin'" class="text-[8px] font-black text-yellow-400/40 uppercase italic tracking-tighter">Stats & Acties</p>
                    </div>
                    <p class="fortnite-font text-5xl text-yellow-400 leading-none">{{ role === 'admin' ? totalOutstandingCredits : personalCredits }} 🪙</p>
                </div>

                <div @click="showPotLogs = true" class="bg-blue-600/10 p-5 rounded-[2rem] border border-blue-500/20 shadow-xl cursor-pointer">
                    <div class="flex justify-between items-center mb-2 text-blue-400">
                        <span class="fortnite-font text-[10px] italic uppercase">{{ familyGoal || 'TBA' }}</span>
                        <span class="fortnite-font text-[10px]">🪙 {{ familyPot }} / {{ familyGoalAmount }}</span>
                    </div>
                    <div class="w-full h-4 bg-slate-900 rounded-full overflow-hidden border border-blue-900/30 p-1">
                        <div class="h-full rounded-full bg-blue-500 transition-all duration-1000 shadow-[0_0_10px_rgba(59,130,246,0.5)]" :style="{ width: Math.min((familyPot / (familyGoalAmount || 1)) * 100, 100) + '%' }"></div>
                    </div>
                    <div v-if="role === 'admin'" class="mt-3 text-center">
                        <button v-if="familyPot >= familyGoalAmount" @click.stop="claimSquadReward" class="bg-green-500 text-black text-[10px] font-black px-4 py-2 rounded-full uppercase animate-pulse">Claim Reward & Reset</button>
                        <button v-else @click.stop="openGoalModal" class="text-[8px] font-black text-blue-400 underline uppercase">Instellingen Doel</button>
                    </div>
                </div>
            </section>

            <nav class="flex gap-2 mb-6">
                <button @click="tab = 'tasks'" :class="tab === 'tasks' ? 'tab-active' : 'bg-slate-800'" class="flex-1 py-3 rounded-xl fortnite-font text-xs">Missions</button>
                <button @click="tab = 'members'" :class="tab === 'members' ? 'tab-active' : 'bg-slate-800'" class="flex-1 py-3 rounded-xl fortnite-font text-xs">Squad</button>
            </nav>

            <main class="flex-1 pb-10">
                <div v-if="tab === 'tasks'" class="space-y-4">
                    <div v-if="role === 'admin' && paydayRequests.length" class="space-y-2 mb-6">
                        <h3 class="fortnite-font text-[10px] text-rose-500 px-2 animate-pulse italic uppercase tracking-widest">Payday Alerts</h3>
                        <div v-for="req in paydayRequests" :key="req.id" class="bg-rose-500/10 border border-rose-500/30 p-4 rounded-2xl flex justify-between items-center">
                            <div class="flex-1"><p class="text-xl font-black italic">🪙 {{ req.amount }} - {{ req.requestedByName }}</p></div>
                            <button @click="approvePayday(req)" class="bg-white text-black px-4 py-2 rounded-xl fortnite-font text-[10px]">PAID</button>
                        </div>
                    </div>

                    <button v-if="role === 'admin'" @click="openCreateModal" class="w-full bg-white text-black py-4 rounded-2xl fortnite-font text-sm mb-6 shadow-xl active:scale-95 transition-all">+ NEW MISSION</button>
                    
                    <div v-for="t in visibleTasks" :key="t.id" 
                         :class="[getRarityClass(t.tokens), isCompletedToday(t) ? 'card-completed' : '', (isTaskExpired(t) && t.status === 'active') ? 'card-expired' : '', isUpcoming(t) ? 'card-upcoming' : '']" 
                         class="p-5 rounded-2xl border-t-4 flex flex-col gap-4 relative shadow-xl transition-all">
                        
                        <div v-if="isUpcoming(t)" class="absolute -top-3 left-1/2 -translate-x-1/2 bg-slate-700 text-white fortnite-font text-[8px] px-3 py-1 rounded-full shadow-xl border border-white/20 whitespace-nowrap z-10">COMING SOON: {{ daysShort[t.selectedDay || 0] }}</div>
                        <div v-if="role === 'admin' && t.status === 'pending'" class="absolute -top-3 left-1/2 -translate-x-1/2 bg-yellow-400 text-black fortnite-font text-[9px] px-4 py-1 rounded-full shadow-xl animate-bounce border-2 border-black whitespace-nowrap z-10 uppercase">CLAIM DOOR {{ t.completedByName }} - APPROVE NOW</div>
                        
                        <div class="flex justify-between items-start">
                            <div @click="role === 'admin' ? openEditModal(t) : null" :class="role === 'admin' ? 'cursor-pointer' : ''" class="flex-1">
                                <span class="text-[9px] font-black uppercase opacity-60 mb-1 block tracking-widest">{{ getRarityName(t.tokens) }} • {{ t.type }} <span v-if="t.assignedToName" class="text-blue-400"> • {{ t.assignedToName }}</span></span>
                                <h3 class="fortnite-font text-lg leading-tight">{{ t.title }}</h3>
                                <div v-if="!isCompletedToday(t) && t.status === 'active' && t.deadlineTime && !isUpcoming(t)" class="mt-2 flex items-center gap-1.5">
                                    <span class="text-[10px] font-black font-mono tracking-tighter" :class="getTimeInfo(t).urgent ? 'text-rose-500' : 'text-slate-300'">
                                        {{ getTimeInfo(t).expired ? 'FAILED' : 'TIME: ' + getTimeInfo(t).formatted }}
                                    </span>
                                </div>
                                <div v-if="isCompletedToday(t)" class="mt-1 text-[9px] font-black text-green-500 uppercase tracking-widest">Mission Accomplished</div>
                                <div v-if="t.status === 'pending' && role !== 'admin'" class="mt-1 text-[9px] font-black text-blue-400 uppercase italic">Secured - Under Review</div>
                            </div>
                            <div class="bg-black/30 px-3 py-1 rounded-lg flex items-center gap-1.5 h-fit">
                                <span class="fortnite-font text-sm text-white italic">{{ t.tokens }}</span>
                                <span class="text-xs">🪙</span>
                            </div>
                        </div>
                        
                        <div v-if="t.status === 'pending' && role === 'admin'" class="flex gap-2">
                            <button @click="approveTask(t)" class="flex-1 bg-green-500 py-3 rounded-xl fortnite-font text-xs uppercase shadow-lg">Approve</button>
                            <button @click="rejectTask(t)" class="flex-1 bg-rose-600 py-3 rounded-xl fortnite-font text-xs uppercase shadow-lg">Deny</button>
                        </div>
                        <button v-else-if="role !== 'admin' && t.status === 'active' && !isTaskExpired(t) && !isUpcoming(t) && !isCompletedToday(t)" @click="claimTask(t)" class="bg-white text-black py-3 rounded-xl fortnite-font text-xs uppercase italic active:scale-95 shadow-xl">Complete Mission</button>
                    </div>
                </div>

                <div v-if="tab === 'members'" class="space-y-6">
                    <div v-for="m in memberListDetails" :key="m.email" @click="viewMemberStats(m)" class="bg-slate-800/60 p-4 rounded-3xl border border-slate-700/50 flex justify-between items-center mb-3 cursor-pointer active:scale-95 transition-all">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center font-black bg-slate-700 text-blue-400 border border-blue-500/20">{{ m.name?.charAt(0) }}</div>
                            <div>
                                <p class="fortnite-font text-sm italic">{{ m.name }}</p>
                                <div class="flex gap-2 items-center"><span class="text-[8px] font-black text-yellow-400 uppercase tracking-widest">🪙 {{ m.credits || 0 }} Gold</span><span v-if="adminEmails.includes(m.email?.toLowerCase())" class="text-[8px] font-black text-blue-400 uppercase bg-blue-400/10 px-1 rounded">Officer</span></div>
                            </div>
                        </div>
                        <div v-if="role === 'admin' && m.email.toLowerCase() !== user.email.toLowerCase()" class="flex gap-1">
                            <button @click.stop="toggleAdmin(m.email, m.name)" class="bg-slate-700 px-2 py-2 rounded-lg text-[8px] fortnite-font uppercase" :class="adminEmails.includes(m.email?.toLowerCase()) ? 'text-blue-400' : 'text-slate-400'">Commander</button>
                            <button @click.stop="confirmDeleteMember(m)" class="bg-rose-900/30 text-rose-500 px-2 py-2 rounded-lg text-[8px] fortnite-font">Kick</button>
                        </div>
                    </div>
                </div>
            </main>

            <div v-if="showStatsModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
                <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" @click="showStatsModal = false"></div>
                <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 relative border border-white/10 shadow-2xl">
                    <div class="text-center mb-6"><h3 class="fortnite-font text-2xl text-blue-400 italic leading-none">PLAYER INTEL</h3><p class="text-[10px] font-black text-slate-500 uppercase mt-1">{{ selectedStats.name }}</p></div>
                    <div class="space-y-3 mb-8">
                        <div class="flex justify-between bg-slate-800/40 p-4 rounded-2xl border border-white/5"><span class="text-[10px] font-black text-slate-400 uppercase">Today</span><span class="fortnite-font text-yellow-400">🪙 {{ selectedStats.today }}</span></div>
                        <div class="flex justify-between bg-slate-800/40 p-4 rounded-2xl border border-white/5"><span class="text-[10px] font-black text-slate-400 uppercase">This Week</span><span class="fortnite-font text-yellow-400">🪙 {{ selectedStats.week }}</span></div>
                        <div class="flex justify-between bg-slate-800/40 p-4 rounded-2xl border border-white/5"><span class="text-[10px] font-black text-slate-400 uppercase">This Month</span><span class="fortnite-font text-yellow-400">🪙 {{ selectedStats.month }}</span></div>
                        <div class="flex justify-between bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20">
                            <div class="flex flex-col"><span class="text-[10px] font-black text-blue-400 uppercase">Total Earned</span><span class="text-[7px] font-bold text-slate-500 uppercase">Sinds {{ selectedStats.since }}</span></div>
                            <span class="fortnite-font text-2xl text-yellow-400">🪙 {{ selectedStats.total }}</span>
                        </div>
                    </div>
                    <button @click="showStatsModal = false" class="w-full bg-white text-black py-4 rounded-2xl fortnite-font text-sm uppercase shadow-xl">Sluiten</button>
                </div>
            </div>

            <div v-if="showGoalModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
                <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" @click="showGoalModal = false"></div>
                <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 relative border border-blue-500/30 text-center shadow-2xl">
                    <h3 class="fortnite-font text-xl mb-2 text-blue-400 uppercase">Squad Target</h3>
                    <div class="space-y-4 my-6 text-left">
                        <input v-model="newGoalName" :disabled="familyPot > 0" placeholder="Beloning" class="w-full p-4 bg-slate-800 rounded-xl font-bold text-white border border-white/5">
                        <input v-model.number="newGoalAmount" :disabled="familyPot > 0" type="number" placeholder="Prijs" class="w-full p-4 bg-slate-800 rounded-xl font-bold text-white border border-white/5">
                    </div>
                    <div v-if="familyPot === 0"><button @click="saveGoal" class="w-full bg-blue-600 text-white py-4 rounded-xl fortnite-font uppercase">Confirm</button></div>
                    <div v-else class="space-y-3"><button @click="cancelAndRefundGoal" class="w-full bg-rose-600 text-white py-4 rounded-xl fortnite-font uppercase">Annuleren & Refund</button></div>
                </div>
            </div>

            <div v-if="showPotLogs" class="fixed inset-0 z-50 flex items-center justify-center p-4">
                <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" @click="showPotLogs = false"></div>
                <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 relative border border-blue-500/30 max-h-[80vh] flex flex-col shadow-2xl">
                    <div class="flex justify-between items-center mb-6 px-2"><h3 class="fortnite-font text-xl text-blue-400 italic uppercase">Squad Ledger</h3><button v-if="role === 'admin'" @click="resetLedger" class="text-[8px] font-black bg-rose-900/50 text-rose-400 px-3 py-1 rounded uppercase">Reset</button></div>
                    <div class="flex-1 overflow-y-auto space-y-3 no-scrollbar px-2"><div v-for="log in potLogs" :key="log.timestamp" class="bg-white/5 p-4 rounded-2xl flex justify-between items-center border border-white/5"><div class="flex-1"><p class="font-black opacity-30 uppercase text-[8px] mb-1">{{ log.type }}</p><p class="font-bold text-slate-300 italic text-xs">{{ log.userName }} - {{ log.description }}</p></div><p class="font-black text-blue-400 italic text-sm ml-4">🪙 +{{ log.amount }}</p></div></div>
                </div>
            </div>

            <div v-if="showBalanceActionModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
                <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" @click="showBalanceActionModal = false"></div>
                <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 relative border border-white/10 shadow-2xl"><h3 class="fortnite-font text-xl mb-6 text-center text-yellow-400 italic uppercase">Squad Bank</h3><div class="grid grid-cols-2 gap-4 mb-6"><button @click="showDonateModal = true; showBalanceActionModal = false" class="bg-blue-600/20 border border-blue-500/30 p-6 rounded-3xl flex flex-col items-center space-y-2 active:scale-95 transition-all"><span class="text-3xl">🎁</span><span class="fortnite-font text-[10px] text-blue-400 uppercase">Donate</span></button><button @click="showPaydayModal = true; showBalanceActionModal = false" class="bg-green-600/20 border border-green-500/30 p-6 rounded-3xl flex flex-col items-center space-y-2 active:scale-95 transition-all"><span class="text-3xl">💸</span><span class="fortnite-font text-[10px] text-green-400 uppercase">Payday</span></button></div><button @click="viewMemberStats({name: user.displayName, email: user.email, createdAt: memberListDetails.find(m => m.email.toLowerCase() === user.email.toLowerCase())?.createdAt}); showBalanceActionModal = false" class="w-full bg-slate-800 py-4 rounded-2xl fortnite-font text-[10px] text-slate-300 uppercase border border-white/5">Mijn Prestaties</button></div>
            </div>

            <div v-if="showDonateModal" class="fixed inset-0 z-50 flex items-center justify-center p-4"><div class="absolute inset-0 bg-black/95 backdrop-blur-xl" @click="showDonateModal = false"></div><div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 relative border border-blue-500/30 text-center shadow-2xl"><h3 class="fortnite-font text-xl mb-2 text-blue-400 uppercase italic">Donate Goud</h3><input v-model.number="donateAmount" type="number" class="w-full p-4 bg-slate-800 rounded-2xl font-black text-white text-center text-3xl mb-6 outline-none border border-white/5"><button @click="confirmDonate" class="w-full bg-blue-600 text-white py-4 rounded-xl fortnite-font uppercase">Schenken</button></div></div>
            <div v-if="showPaydayModal" class="fixed inset-0 z-50 flex items-center justify-center p-4"><div class="absolute inset-0 bg-black/95 backdrop-blur-xl" @click="showPaydayModal = false"></div><div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 relative border border-green-500/30 text-center shadow-2xl"><h3 class="fortnite-font text-xl mb-6 text-green-500 uppercase italic">Payday Request</h3><div class="flex gap-2 mb-6"><button @click="paydayAmount = personalCredits" class="flex-1 bg-slate-800 p-4 rounded-xl text-[10px] font-black uppercase border border-white/5">Max</button><input v-model.number="paydayAmount" type="number" class="flex-[2] p-4 bg-slate-800 rounded-xl font-black text-white text-center text-2xl outline-none"></div><button @click="requestPayday" class="w-full bg-green-500 text-black py-4 rounded-xl fortnite-font shadow-lg uppercase">Verzoek</button></div></div>
            <div v-if="showCreateModal" class="fixed inset-0 z-50 flex items-center justify-center p-4"><div class="absolute inset-0 bg-black/95 backdrop-blur-xl" @click="showCreateModal = false"></div><div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-6 relative border border-white/10 shadow-2xl overflow-y-auto max-h-[90vh]"><h3 class="fortnite-font text-xl mb-6 italic text-center text-blue-400 uppercase italic">{{ isEditing ? 'Edit Mission' : 'New Mission' }}</h3><div class="space-y-4"><input v-model="newTask.title" placeholder="Naam" class="w-full p-4 bg-slate-800 rounded-xl text-sm font-bold text-white outline-none"><div><label class="text-[9px] font-black text-blue-400 uppercase ml-2 block">Target</label><select v-model="newTask.assignedTo" class="w-full p-4 bg-slate-800 rounded-xl text-sm font-bold text-white outline-none"><option value="">Iedereen</option><option v-for="m in squadOnly" :key="m.email" :value="m.email?.toLowerCase()">{{ m.name }}</option></select></div><div class="flex gap-2"><input v-model.number="newTask.tokens" type="number" placeholder="Gold" class="flex-1 p-4 bg-slate-800 rounded-xl text-sm font-bold text-white outline-none"><select v-model="newTask.type" class="flex-1 p-4 bg-slate-800 rounded-xl text-[11px] font-bold text-white outline-none"><option value="once">Once</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></div><div v-if="newTask.type === 'daily'"><input v-model="newTask.deadlineTime" type="time" class="w-full p-4 bg-slate-800 rounded-xl font-bold text-white outline-none"></div><div v-if="newTask.type === 'weekly' || newTask.type === 'monthly'" class="grid grid-cols-4 gap-2"><button v-for="(day, idx) in daysShort" :key="idx" @click="newTask.selectedDay = idx" :class="newTask.selectedDay === idx ? 'bg-blue-600' : 'bg-slate-700 opacity-40'" class="py-2 rounded-lg text-[9px] font-black uppercase">{{ day }}</button></div><select v-model="newTask.rewardType" class="w-full p-4 bg-slate-800 rounded-xl text-sm font-bold text-white outline-none border border-white/5"><option value="persoonlijk">Personal Gold</option><option value="familiepot">Squad Pot</option></select><div class="flex gap-2 pt-4"><button v-if="isEditing" @click="deleteTask(newTask.id)" class="flex-1 bg-rose-900/50 text-rose-500 py-4 rounded-xl fortnite-font text-xs uppercase">Delete</button><button @click="saveTask" class="flex-[2] bg-blue-600 text-white py-4 rounded-xl fortnite-font text-sm uppercase">Deploy</button></div></div></div></div>
        </template>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAGSSTZivu3OfKjdR-61BNy0WlXFeH9C80", authDomain: "familyreward-c4582.firebaseapp.com", projectId: "familyreward-c4582", storageBucket: "familyreward-c4582.firebasestorage.app", messagingSenderId: "500697306700", appId: "1:500697306700:web:e812d2b9891c4d2f64c6e9" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const auth = firebase.auth(); const { createApp, ref, computed, onMounted } = Vue;

        db.enablePersistence().catch(err => console.error("Offline persistence failed", err));

        createApp({
            setup() {
                const user = ref(null); const familyId = ref(null); const familyName = ref(''); const role = ref('user');
                const personalCredits = ref(0); const familyPot = ref(0); const familyGoal = ref(''); const familyGoalAmount = ref(100);
                const targetStartTime = ref(null); const memberListDetails = ref([]); const adminEmails = ref([]); const activeTasks = ref([]); 
                const paydayRequests = ref([]); const potLogs = ref([]); const tab = ref('tasks');
                const showCreateModal = ref(false); const isEditing = ref(false); const showGoalModal = ref(false); 
                const showPotLogs = ref(false); const showPaydayModal = ref(false); const showDonateModal = ref(false); 
                const showBalanceActionModal = ref(false); const showStatsModal = ref(false);
                const currentTime = ref(new Date()); const daysShort = ['Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za', 'Zo'];
                const newTask = ref({ title: '', tokens: 10, type: 'once', rewardType: 'persoonlijk', selectedDay: 0, deadlineTime: '', assignedTo: '' });
                const newGoalName = ref(''); const newGoalAmount = ref(100); const donateAmount = ref(0); const paydayAmount = ref(0);
                const selectedStats = ref({ name: '', today: 0, week: 0, month: 0, total: 0, since: '', email: '' });

                setInterval(() => { currentTime.value = new Date(); }, 1000);
                
                const now = () => currentTime.value;
                const isSameDay = (d1, d2) => d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();
                
                const getWeek = (d) => {
                    const date = new Date(d.getTime()); date.setHours(0,0,0,0);
                    date.setDate(date.getDate() + 4 - (date.getDay()||7));
                    const yearStart = new Date(date.getFullYear(),0,1);
                    return Math.ceil((((date - yearStart) / 86400000) + 1)/7);
                };

                const isCompletedToday = (t) => {
                    if (!t.lastCompletedDate) return false;
                    return isSameDay(now(), t.lastCompletedDate.toDate());
                };

                const squadOnly = computed(() => memberListDetails.value.filter(m => !adminEmails.value.includes(m.email?.toLowerCase())));
                const totalOutstandingCredits = computed(() => squadOnly.value.reduce((sum, m) => sum + (m.credits || 0), 0));

                const isUpcoming = (t) => {
                    const n = now(); const d = (n.getDay() + 6) % 7;
                    if (t.type === 'once' || t.type === 'daily') return false;
                    if (t.type === 'weekly') return d !== (t.selectedDay || 0);
                    if (t.type === 'monthly') return false;
                    return false;
                };

                const isTaskExpired = (t) => {
                    if (!t.deadlineTime || t.status !== 'active' || isUpcoming(t)) return false;
                    const [h, m] = t.deadlineTime.split(':'); const target = new Date(now()); target.setHours(parseInt(h), parseInt(m), 0, 0);
                    return now() > target;
                };

                const getTimeInfo = (t) => {
                    if (!t.deadlineTime) return { formatted: '', expired: false, urgent: false };
                    const [h, m] = t.deadlineTime.split(':'); const target = new Date(now()); target.setHours(parseInt(h), parseInt(m), 0, 0);
                    const diff = target - now(); if (diff <= 0) return { formatted: '0:0', expired: true, urgent: true };
                    const hrs = Math.floor(diff/3600000), mins = Math.floor((diff%3600000)/60000);
                    return { formatted: `${hrs}:${mins}`, expired: false, urgent: diff < 3600000 };
                };

                const visibleTasks = computed(() => {
                    const m = user.value?.email?.toLowerCase();
                    const n = now();
                    
                    const tasks = activeTasks.value.map(t => {
                        const task = { ...t };
                        if (task.status === 'completed' && task.lastCompletedDate) {
                            const last = task.lastCompletedDate.toDate();
                            let reset = false;
                            if (task.type === 'daily' && !isSameDay(n, last)) reset = true;
                            else if (task.type === 'weekly' && getWeek(n) !== getWeek(last)) reset = true;
                            else if (task.type === 'monthly' && n.getMonth() !== last.getMonth()) reset = true;
                            
                            if (reset) {
                                db.collection('tasks').doc(task.id).update({ status: 'active', completedBy: null, completedByName: null });
                                task.status = 'active'; 
                            }
                        }
                        return task;
                    }).filter(t => (role.value === 'admin' || !t.assignedTo || t.assignedTo === m));

                    const pending = tasks.filter(t => t.status === 'pending');
                    const active = tasks.filter(t => t.status === 'active' && !isUpcoming(t) && !isTaskExpired(t) && !isCompletedToday(t));
                    const inactive = tasks.filter(t => isCompletedToday(t) || isUpcoming(t) || isTaskExpired(t) || t.status === 'completed');
                    
                    active.sort((a, b) => b.tokens - a.tokens);
                    return [...pending, ...active, ...inactive];
                });

                const viewMemberStats = (m) => {
                    if (!m) return;
                    const n = now();
                    const sDay = new Date(n.getFullYear(), n.getMonth(), n.getDate()).getTime();
                    const sWeek = new Date(n.getFullYear(), n.getMonth(), n.getDate() - (n.getDay() + 6) % 7).getTime();
                    const sMonth = new Date(n.getFullYear(), n.getMonth(), 1).getTime();
                    const logs = potLogs.value.filter(l => l.userName === m.name && l.type === 'MISSION');
                    selectedStats.value = {
                        name: m.name, email: m.email?.toLowerCase() || '',
                        today: logs.filter(l => l.timestamp?.toDate().getTime() >= sDay).reduce((s, l) => s + l.amount, 0),
                        week: logs.filter(l => l.timestamp?.toDate().getTime() >= sWeek).reduce((s, l) => s + l.amount, 0),
                        month: logs.filter(l => l.timestamp?.toDate().getTime() >= sMonth).reduce((s, l) => s + l.amount, 0),
                        total: logs.reduce((s, l) => s + l.amount, 0),
                        since: m.createdAt ? m.createdAt.toDate().toLocaleDateString('nl-NL') : 'Lidmaatschap'
                    };
                    showStatsModal.value = true;
                };

                const checkUserAccess = (u) => {
                    db.collection('families').where('member_emails', 'array-contains', u.email.toLowerCase()).onSnapshot(snap => {
                        if (!snap.empty) {
                            const d = snap.docs[0]; familyId.value = d.id; const data = d.data();
                            familyName.value = data.familyName; familyPot.value = data.familyPot || 0;
                            familyGoal.value = data.familyGoal || ''; familyGoalAmount.value = data.familyGoalAmount || 100;
                            targetStartTime.value = data.targetStartTime || null;
                            adminEmails.value = (data.admin_emails || []).map(e => e.toLowerCase());
                            role.value = adminEmails.value.includes(u.email.toLowerCase()) ? 'admin' : 'user';
                            db.collection('families').doc(familyId.value).collection('members').onSnapshot(mSnap => {
                                memberListDetails.value = mSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                personalCredits.value = memberListDetails.value.find(m => m.email?.toLowerCase() === u.email.toLowerCase())?.credits || 0;
                            });
                            db.collection('tasks').where('familyId', '==', familyId.value).onSnapshot(tSnap => {
                                activeTasks.value = tSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            });
                            db.collection('families').doc(familyId.value).collection('payday').where('status', '==', 'pending').onSnapshot(pSnap => paydayRequests.value = pSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                            db.collection('families').doc(familyId.value).collection('potLogs').orderBy('timestamp', 'desc').onSnapshot(lSnap => potLogs.value = lSnap.docs.map(doc => doc.data()));
                        }
                    });
                };

                onMounted(() => auth.onAuthStateChanged(u => { if (u) { user.value = u; checkUserAccess(u); } }));

                return { 
                    user, familyId, familyName, role, personalCredits, familyPot, familyGoal, familyGoalAmount, totalOutstandingCredits, memberListDetails, adminEmails, visibleTasks, potLogs, paydayRequests, tab, daysShort, showCreateModal, isEditing, showGoalModal, showPotLogs, showPaydayModal, showDonateModal, showBalanceActionModal, showStatsModal, newTask, donateAmount, paydayAmount, squadOnly, newGoalName, newGoalAmount, selectedStats, viewMemberStats, getTimeInfo, isTaskExpired, isUpcoming, isCompletedToday,
                    login: () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()),
                    logout: () => auth.signOut().then(() => location.reload()),
                    openCreateModal: () => { isEditing.value = false; newTask.value = { title: '', tokens: 10, type: 'once', rewardType: 'persoonlijk', selectedDay: 0, deadlineTime: '', assignedTo: '' }; showCreateModal.value = true; },
                    openEditModal: (t) => { isEditing.value = true; newTask.value = { ...t }; showCreateModal.value = true; },
                    openGoalModal: () => { newGoalName.value = familyGoal.value; newGoalAmount.value = familyGoalAmount.value; showGoalModal.value = true; },
                    saveGoal: async () => { await db.collection('families').doc(familyId.value).update({ familyGoal: newGoalName.value, familyGoalAmount: newGoalAmount.value, targetStartTime: new Date() }); showGoalModal.value = false; },
                    saveTask: async () => { if (!newTask.value.title) return; let data = { ...newTask.value, familyId: familyId.value }; if (data.assignedTo) data.assignedToName = memberListDetails.value.find(m => m.email?.toLowerCase() === data.assignedTo)?.name || ''; if (isEditing.value) await db.collection('tasks').doc(newTask.value.id).update(data); else await db.collection('tasks').add({ ...data, status: 'active', createdAt: new Date() }); showCreateModal.value = false; },
                    approveTask: async (task) => { 
                        const m = memberListDetails.value.find(x => x.email?.toLowerCase() === task.completedBy); 
                        if (m) {
                            if (task.rewardType === 'familiepot') await db.collection('families').doc(familyId.value).update({ familyPot: firebase.firestore.FieldValue.increment(task.tokens) });
                            else await db.collection('families').doc(familyId.value).collection('members').doc(m.id).update({ credits: firebase.firestore.FieldValue.increment(task.tokens) });
                            await db.collection('families').doc(familyId.value).collection('potLogs').add({ type: 'MISSION', userName: m.name, description: task.title, amount: task.tokens, timestamp: new Date() }); 
                        }
                        if (task.type === 'once') await db.collection('tasks').doc(task.id).delete(); 
                        else await db.collection('tasks').doc(task.id).update({ status: 'completed', completedBy: null, lastCompletedDate: new Date() });
                    },
                    deleteTask: async (id) => { if (confirm("Abort?")) { await db.collection('tasks').doc(id).delete(); showCreateModal.value = false; } },
                    claimTask: async (t) => await db.collection('tasks').doc(t.id).update({ status: 'pending', completedBy: user.value.email.toLowerCase(), completedByName: user.value.displayName.split(' ')[0] }),
                    rejectTask: async (t) => await db.collection('tasks').doc(t.id).update({ status: 'active', completedBy: null, completedByName: null }),
                    resetLedger: async () => { if (confirm("Wis Ledger?")) { const b = db.batch(); (await db.collection('families').doc(familyId.value).collection('potLogs').get()).forEach(d => b.delete(d.ref)); b.update(db.collection('families').doc(familyId.value), { familyPot: 0 }); await b.commit(); } },
                    cancelAndRefundGoal: async () => {
                        if (!confirm("Refund?")) return;
                        const b = db.batch(); const start = targetStartTime.value?.toDate().getTime() || 0;
                        const logs = await db.collection('families').doc(familyId.value).collection('potLogs').where('type', '==', 'DONATION').get();
                        logs.forEach(doc => { if (doc.data().timestamp?.toDate().getTime() >= start) { const m = memberListDetails.value.find(x => x.name === doc.data().userName); if (m) b.update(db.collection('families').doc(familyId.value).collection('members').doc(m.id), { credits: firebase.firestore.FieldValue.increment(doc.data().amount) }); b.delete(doc.ref); } });
                        b.update(db.collection('families').doc(familyId.value), { familyPot: 0, targetStartTime: null }); await b.commit(); showGoalModal.value = false;
                    },
                    confirmDonate: async () => { if (donateAmount.value <= 0 || donateAmount.value > personalCredits.value) return; if (confirm(`🎁 Schenken?`)) { const m = memberListDetails.value.find(x => x.email?.toLowerCase() === user.value.email.toLowerCase()); await db.collection('families').doc(familyId.value).collection('members').doc(m.id).update({ credits: firebase.firestore.FieldValue.increment(-donateAmount.value) }); await db.collection('families').doc(familyId.value).update({ familyPot: firebase.firestore.FieldValue.increment(donateAmount.value) }); await db.collection('families').doc(familyId.value).collection('potLogs').add({ type: 'DONATION', userName: m.name, description: 'SQUAD GIFT', amount: donateAmount.value, timestamp: new Date() }); showDonateModal.value = false; donateAmount.value = 0; } },
                    requestPayday: async () => { if (paydayAmount.value <= 0 || paydayAmount.value > personalCredits.value) return; await db.collection('families').doc(familyId.value).collection('payday').add({ amount: paydayAmount.value, requestedBy: user.value.email.toLowerCase(), requestedByName: user.value.displayName.split(' ')[0], status: 'pending', timestamp: new Date() }); showPaydayModal.value = false; paydayAmount.value = 0; },
                    claimSquadReward: async () => { if (confirm("Reward claimen?")) { await db.collection('families').doc(familyId.value).update({ familyPot: 0, targetStartTime: null }); const b = db.batch(); (await db.collection('families').doc(familyId.value).collection('potLogs').get()).forEach(d => b.delete(d.ref)); await b.commit(); } },
                    toggleAdmin: async (e, n) => { const mail = e.toLowerCase(); if (adminEmails.value.includes(mail)) await db.collection('families').doc(familyId.value).update({ admin_emails: firebase.firestore.FieldValue.arrayRemove(mail) }); else await db.collection('families').doc(familyId.value).update({ admin_emails: firebase.firestore.FieldValue.arrayUnion(mail) }); },
                    confirmDeleteMember: (m) => { if (confirm(`Kick ${m.name}?`)) { db.collection('families').doc(familyId.value).update({ member_emails: firebase.firestore.FieldValue.arrayRemove(m.email?.toLowerCase()) }); db.collection('families').doc(familyId.value).collection('members').doc(m.id).delete(); } },
                    approvePayday: async (req) => { const m = memberListDetails.value.find(x => x.email?.toLowerCase() === req.requestedBy); if(m) await db.collection('families').doc(familyId.value).collection('members').doc(m.id).update({ credits: firebase.firestore.FieldValue.increment(-req.amount) }); await db.collection('families').doc(familyId.value).collection('payday').doc(req.id).update({ status: 'approved' }); },
                    getRarityClass: (t) => t >= 21 ? 'card-legendary' : t >= 11 ? 'card-epic' : t >= 6 ? 'card-uncommon' : 'card-common', getRarityName: (t) => t >= 21 ? 'Legendary' : t >= 11 ? 'Epic' : t >= 6 ? 'Uncommon' : 'Common'
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
