<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gezins Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50">
    <div id="app" class="min-h-screen flex flex-col font-sans text-slate-900">
        
        <div v-if="errorMessage" class="bg-red-600 text-white p-4 text-center text-xs font-bold sticky top-0 z-50">
            {{ errorMessage }}
            <button @click="errorMessage = null" class="ml-2 underline text-white/80 font-normal">sluiten</button>
        </div>

        <div v-if="isLoading" class="flex-1 flex flex-col items-center justify-center bg-white">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
            <p class="text-slate-400">Bezig met laden...</p>
        </div>

        <div v-else-if="!user" class="flex-1 flex flex-col items-center justify-center p-6 bg-white">
            <h1 class="text-4xl font-black mb-2">Gezins Hub</h1>
            <p class="text-slate-500 mb-8 text-center text-sm">Beheer klusjes en credits.</p>
            <button @click="loginWithPopup" class="w-full max-w-xs bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">
                Inloggen met Google
            </button>
        </div>

        <div v-else-if="user && !familyId" class="flex-1 flex flex-col items-center justify-center p-6">
            <div class="w-full max-w-xs text-center bg-white p-8 rounded-3xl shadow-xl">
                <h2 class="text-xl font-bold mb-4 italic text-blue-600">Hoi {{ user.displayName }}!</h2>
                <p class="text-slate-500 text-sm mb-6">Er is nog geen gezin gekoppeld aan <b>{{ user.email }}</b>.</p>
                <input v-model="newFamilyName" placeholder="Gezinsnaam..." class="w-full p-4 bg-slate-50 rounded-xl border-2 border-blue-100 mb-4 text-center font-bold">
                <button @click="createFamily" :disabled="!newFamilyName" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg">
                    Maak Gezin Aan
                </button>
                <button @click="logout" class="mt-8 text-slate-400 text-xs underline block w-full">Uitloggen</button>
            </div>
        </div>

        <div v-else class="flex-1 flex flex-col">
            <header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-10 shadow-sm">
                <div>
                    <h2 class="font-extrabold text-lg leading-tight">{{ familyName }}</h2>
                    <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest">{{ role === 'admin' ? 'Ouder' : 'Kind' }}</p>
                </div>
                <button @click="logout" class="text-slate-300">Log uit</button>
            </header>
            <main class="flex-1 p-4">
                <p class="text-center text-slate-400 mt-10">Je bent binnen! Welkom in het dashboard.</p>
            </main>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGSSTZivu3OfKjdR-61BNy0WlXFeH9C80",
            authDomain: "familyreward-c4582.firebaseapp.com",
            projectId: "familyreward-c4582",
            storageBucket: "familyreward-c4582.firebasestorage.app",
            messagingSenderId: "500697306700",
            appId: "1:500697306700:web:e812d2b9891c4d2f64c6e9"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const isLoading = ref(true);
                const user = ref(null);
                const familyId = ref(null);
                const familyName = ref('');
                const role = ref('user');
                const newFamilyName = ref('');
                const errorMessage = ref(null);

                const loginWithPopup = async () => {
                    errorMessage.value = null;
                    const provider = new firebase.auth.GoogleAuthProvider();
                    try {
                        const result = await auth.signInWithPopup(provider);
                        user.value = result.user;
                        await checkUserAccess(result.user);
                    } catch (e) {
                        errorMessage.value = "Inlogfout: " + e.message;
                    }
                };

                const logout = () => auth.signOut().then(() => window.location.reload());

                const checkUserAccess = async (u) => {
                    isLoading.value = true;
                    try {
                        const email = u.email.toLowerCase();
                        const snap = await db.collection('families').where('member_emails', 'array-contains', email).get();
                        if (!snap.empty) {
                            const doc = snap.docs[0];
                            familyId.value = doc.id;
                            familyName.value = doc.data().familyName;
                            role.value = (doc.data().admin_emails || [email]).includes(email) ? 'admin' : 'user';
                        }
                    } catch (e) {
                        errorMessage.value = "Databasefout: " + e.message;
                    } finally {
                        isLoading.value = false;
                    }
                };

                const createFamily = async () => {
                    if (!newFamilyName.value) return;
                    isLoading.value = true;
                    try {
                        const email = user.value.email.toLowerCase();
                        const newDoc = await db.collection('families').add({
                            familyName: newFamilyName.value,
                            member_emails: [email],
                            admin_emails: [email],
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        familyId.value = newDoc.id;
                        familyName.value = newFamilyName.value;
                        role.value = 'admin';
                    } catch (e) {
                        errorMessage.value = "Aanmaakfout: " + e.message;
                    } finally {
                        isLoading.value = false;
                    }
                };

                onMounted(() => {
                    auth.onAuthStateChanged(u => {
                        if (u) {
                            user.value = u;
                            checkUserAccess(u);
                        } else {
                            isLoading.value = false;
                        }
                    });
                });

                return { isLoading, user, familyId, familyName, role, newFamilyName, errorMessage, loginWithPopup, logout, createFamily };
            }
        }).mount('#app');
    </script>
</body>
</html>
