<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FAMILY SQUAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --common: #b1b1b1; --uncommon: #43c034; --epic: #b233f0; --legendary: #f0ad1d; --squad: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .fortnite-font { font-weight: 800; text-transform: uppercase; letter-spacing: -0.01em; }
        .card-squad { background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); border-top: 4px solid var(--squad); }
        .card-common { background: linear-gradient(135deg, #374151 0%, #111827 100%); border-top: 4px solid var(--common); }
        .card-uncommon { background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); border-top: 4px solid var(--uncommon); }
        .card-epic { background: linear-gradient(135deg, #581c87 0%, #2e1065 100%); border-top: 4px solid var(--epic); }
        .card-legendary { background: linear-gradient(135deg, #78350f 0%, #451a03 100%); border-top: 4px solid var(--legendary); position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(240, 173, 29, 0.4); }
        .card-legendary::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent); transform: rotate(45deg); animation: shine 3s infinite; }
        @keyframes shine { 0% { margin-left: -100%; } 100% { margin-left: 100%; } }
        .card-completed { background: #1e293b !important; border-top: 4px solid #475569 !important; opacity: 0.6; filter: grayscale(1); }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="min-h-screen flex flex-col max-w-md mx-auto pb-24 px-4">
        
        <div v-if="successMsg" class="fixed inset-x-0 top-10 z-[100] flex justify-center px-4 pointer-events-none text-center">
            <div class="bg-blue-600 text-white fortnite-font px-6 py-4 rounded-2xl shadow-2xl animate-bounce border-2 border-white/20">
                <p class="text-sm italic leading-tight font-black uppercase">{{ successMsg }}</p>
            </div>
        </div>

        <template v-if="user && familyId">
            <header class="py-6 flex justify-between items-center border-b border-white/5 mb-4">
                <div class="flex flex-col">
                    <div class="flex items-center gap-2">
                        <h1 class="fortnite-font text-2xl italic italic">SQUAD HUB</h1>
                        <span :class="['text-[9px] font-black uppercase px-2 py-0.5 rounded-full bg-white/5 border border-white/10', getRankColor(personalTotalEarned)]">
                            {{ getRank(personalTotalEarned) }}
                        </span>
                    </div>
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">{{ familyName }}</p>
                </div>
                <button @click="logout" class="text-slate-500 text-[10px] font-black bg-slate-800 px-3 py-1 rounded-lg uppercase">Quit</button>
            </header>

            <section class="mb-6 space-y-4">
                <div class="bg-slate-900/80 p-6 rounded-[2rem] border border-white/5 shadow-2xl transition-all cursor-pointer active:scale-95 text-yellow-400">
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-[10px] font-black uppercase tracking-widest opacity-60">Vault Status</p>
                        <p class="text-[9px] font-black uppercase tracking-tighter text-blue-400">Vandaag: {{ todayEarned }} / 40 🪙</p>
                    </div>
                    <p class="fortnite-font text-5xl leading-none">{{ role === 'admin' ? totalOutstandingCredits : personalCredits }} 🪙</p>
                </div>

                <div class="bg-blue-600/10 p-5 rounded-[2rem] border border-blue-500/20 shadow-xl cursor-pointer">
                    <div class="flex justify-between items-center mb-2 text-blue-400 text-[10px]">
                        <span class="fortnite-font italic uppercase">🎯 TARGET: {{ familyGoal || 'REWARD' }}</span>
                        <span class="fortnite-font">🪙 {{ familyPot }} / {{ familyGoalAmount }}</span>
                    </div>
                    <div class="w-full h-5 bg-slate-900 rounded-full border border-blue-900/30 p-1 relative">
                        <div class="h-full rounded-full bg-blue-500 transition-all duration-1000 shadow-[0_0_10px_rgba(59,130,246,0.5)]" :style="{ width: potPercentage + '%' }"></div>
                        <span class="absolute inset-0 flex items-center justify-center text-[9px] font-black text-white uppercase italic tracking-tighter">{{ potPercentage }}% Sync</span>
                    </div>
                </div>
            </section>

            <main class="flex-1 pb-10">
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-2 mb-1 text-[10px] font-black uppercase tracking-widest text-slate-500 italic">
                        <h3>Active Operations</h3>
                        <p class="text-blue-400">Potential: 🪙 {{ potentialLoss }}</p>
                    </div>

                    <div v-for="t in visibleTasks" :key="t.id" 
                         :class="[t.rewardType === 'familiepot' ? 'card-squad' : getRarityClass(t.tokens || 0), isOnCooldown(t) ? 'card-completed' : '']" 
                         class="p-5 rounded-2xl border-t-4 flex flex-col gap-4 relative shadow-xl transition-all">
                        
                        <div v-if="isOnCooldown(t)" class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-700 text-white fortnite-font text-[8px] px-4 py-1 rounded-full border border-white/10 uppercase italic tracking-widest z-20">
                            ⏳ Morgen weer beschikbaar
                        </div>

                        <div v-if="t.status === 'pending'" class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-yellow-400 text-black fortnite-font text-[9px] px-4 py-1 rounded-full shadow-xl border-2 border-black uppercase italic tracking-widest animate-pulse z-20 flex flex-col items-center">
                            <span>Awaiting Verification</span>
                            <span class="text-[7px] opacity-80 font-black italic">{{ getTimeSince(t.claimedAt) }} geleden</span>
                        </div>

                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[9px] font-black uppercase opacity-60 tracking-widest">{{ getRarityName(t.tokens || 0) }}</span>
                                    <span v-if="(t.streak || 0) > 1 && !isOnCooldown(t)" class="text-[9px] font-black text-orange-400 italic">🔥 Streak: {{ t.streak }} d.</span>
                                </div>
                                <h3 class="fortnite-font text-lg leading-tight">{{ t.title }}</h3>
                                
                                <div v-if="t.rewardType === 'familiepot' && t.status === 'active'" class="mt-2 flex flex-wrap gap-2">
                                    <div v-for="(c, idx) in (t.contributors || [])" :key="idx" class="flex items-center gap-1 bg-black/20 px-2 py-1 rounded-lg">
                                        <span class="text-[8px] font-black uppercase text-blue-400">{{ c.email.split('@')[0] }}</span>
                                        <span class="text-[10px]">
                                            {{ (() => { const type = getContributionType(t, c); return type === 'core' ? '🔥' : type === 'assist' ? '⚡' : '⚪'; })() }}
                                        </span>
                                    </div>
                                </div>
                                <div v-if="isCompletedToday(t) && !isOnCooldown(t)" class="mt-1 text-[9px] font-black text-green-500 uppercase tracking-widest italic">Mission Secured</div>
                            </div>
                            <div class="bg-black/30 px-3 py-1 rounded-lg flex items-center gap-1.5 h-fit text-white">
                                <span class="fortnite-font text-sm italic">{{ t.tokens || 0 }}</span>
                                <span class="text-xs">🪙</span>
                            </div>
                        </div>
                        
                        <div v-if="t.status === 'pending' && role === 'admin'" class="flex gap-2">
                            <button @click="approveTask(t)" class="flex-1 bg-green-500 py-3 rounded-xl fortnite-font text-xs uppercase shadow-lg font-black italic">Verify</button>
                            <button @click="rejectTask(t)" class="flex-1 bg-rose-600 py-3 rounded-xl fortnite-font text-xs uppercase shadow-lg font-black italic">Deny</button>
                        </div>
                        <button v-else-if="role !== 'admin' && t.status === 'active' && !isOnCooldown(t)" 
                                @click="claimTask(t)" 
                                :disabled="(t.contributors || []).some(c => c.email === user.email.toLowerCase()) || (t.contributors || []).length >= (t.requiredContributors || 1)"
                                class="bg-white text-black py-3 rounded-xl fortnite-font text-xs uppercase active:scale-95 shadow-xl disabled:opacity-50 font-black italic">
                            Commit
                        </button>
                    </div>
                </div>
            </main>
        </template>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAGSSTZivu3OfKjdR-61BNy0WlXFeH9C80", authDomain: "familyreward-c4582.firebaseapp.com", projectId: "familyreward-c4582", storageBucket: "familyreward-c4582.firebasestorage.app", messagingSenderId: "500697306700", appId: "1:500697306700:web:e812d2b9891c4d2f64c6e9" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const auth = firebase.auth(); const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

        createApp({
            setup() {
                const user = ref(null); const familyId = ref(null); const familyName = ref(''); const role = ref('user');
                const personalCredits = ref(0); const personalTotalEarned = ref(0); const familyPot = ref(0); 
                const familyGoal = ref(''); const familyGoalAmount = ref(100);
                const memberListDetails = ref([]); const adminEmails = ref([]); const activeTasks = ref([]); 
                const potLogs = ref([]); const tab = ref('tasks');
                const successMsg = ref(''); const currentTime = ref(new Date());

                let intervalId = null; let unsubscribers = [];

                onMounted(() => {
                    auth.onAuthStateChanged(u => { if (u) { user.value = u; checkUserAccess(u); } else { unsubscribers.forEach(unsub => unsub()); unsubscribers = []; } });
                    intervalId = setInterval(() => { currentTime.value = new Date(); }, 10000);
                });

                onUnmounted(() => { if (intervalId) clearInterval(intervalId); unsubscribers.forEach(unsub => unsub()); });

                const now = () => currentTime.value;
                const DAY = 86400000;
                const triggerSuccess = (msg) => { successMsg.value = msg; setTimeout(() => { successMsg.value = ''; }, 4500); };
                const isSameDay = (d1, d2) => d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() && d1.getDate() === d2.getDate();

                const getContributionType = (task, contributor) => {
                    if (!task.contributors?.length || !contributor.joinedAt) return 'late';
                    const sorted = [...task.contributors].sort((a,b) => a.joinedAt.toDate() - b.joinedAt.toDate());
                    const delta = contributor.joinedAt.toDate().getTime() - sorted[0].joinedAt.toDate().getTime();
                    return delta <= 30000 ? 'core' : delta <= 60000 ? 'assist' : 'late';
                };

                const isOnCooldown = (t) => {
                    if (!t.lastCompletedDate) return false;
                    const diff = now().getTime() - t.lastCompletedDate.toDate().getTime();
                    return diff < (t.type === 'weekly' ? 7 * DAY : DAY);
                };

                const getTimeSince = (date) => {
                    if (!date) return ''; const d = date.toDate ? date.toDate() : new Date(date);
                    const diff = now().getTime() - d.getTime(); const min = Math.floor(diff / 60000);
                    return min < 1 ? 'zojuist' : min < 60 ? `${min} min` : `${Math.floor(min/60)} uur`;
                };

                const todayEarned = computed(() => { 
                    const start = new Date(now().getTime()); start.setHours(0,0,0,0); 
                    return potLogs.value
                        .filter(l => l.userEmail === user.value?.email?.toLowerCase() && l.type === 'MISSION' && l.timestamp?.toDate().getTime() >= start.getTime())
                        .reduce((sum, l) => sum + (l.amount || 0), 0); 
                });

                const checkUserAccess = (u) => {
                    unsubscribers.forEach(unsub => unsub()); unsubscribers = [];
                    const u1 = db.collection('families').where('member_emails', 'array-contains', u.email.toLowerCase()).onSnapshot(snap => {
                        if (snap.empty) return;
                        const d = snap.docs[0]; familyId.value = d.id; const data = d.data();
                        familyName.value = data.familyName; familyPot.value = data.familyPot || 0; familyGoalAmount.value = data.familyGoalAmount || 100;
                        adminEmails.value = (data.admin_emails || []).map(e => e.toLowerCase()); role.value = adminEmails.value.includes(u.email.toLowerCase()) ? 'admin' : 'user';
                        
                        unsubscribers.slice(1).forEach(unsub => unsub()); unsubscribers = [u1];
                        const u2 = db.collection('families').doc(d.id).collection('members').onSnapshot(m => {
                            memberListDetails.value = m.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            const me = memberListDetails.value.find(m => m.email?.toLowerCase() === u.email.toLowerCase());
                            personalCredits.value = me?.credits || 0; personalTotalEarned.value = me?.totalEarned || 0;
                        });
                        const u3 = db.collection('tasks').where('familyId', '==', d.id).onSnapshot(t => activeTasks.value = t.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                        const u4 = db.collection('families').doc(d.id).collection('potLogs').orderBy('timestamp', 'desc').onSnapshot(l => potLogs.value = l.docs.map(doc => ({id: doc.id, ...doc.data()})));
                        unsubscribers.push(u2, u3, u4);
                    });
                    unsubscribers.push(u1);
                };

                const visibleTasks = computed(() => {
                    const tasks = activeTasks.value.map(t => {
                        const task = { ...t };
                        if (task.status === 'completed' && !isOnCooldown(task)) task.status = 'active';
                        return task;
                    }).filter(t => (role.value === 'admin' || !t.assignedTo || t.assignedTo === user.value?.email?.toLowerCase()));
                    const pending = tasks.filter(t => t.status === 'pending');
                    const activeSquad = tasks.filter(t => t.rewardType === 'familiepot' && t.status === 'active');
                    const activeSolo = tasks.filter(t => t.rewardType !== 'familiepot' && t.status === 'active' && !isSameDay(now(), t.lastCompletedDate?.toDate() || new Date(0)));
                    return role.value === 'admin' ? [...pending, ...activeSquad, ...activeSolo] : [...activeSquad, ...pending, ...activeSolo];
                });

                const potentialLoss = computed(() => {
                    const cap = Math.max(0, 40 - todayEarned.value); let xp = 0; let rem = cap;
                    const tasks = visibleTasks.value.filter(t => t.status === 'active').sort((a,b) => (b.tokens || 0) - (a.tokens || 0));
                    for(const t of tasks) { if(rem <= 0) break; const v = Math.min(t.tokens || 0, rem); xp += v; rem -= v; }
                    return xp;
                });

                return { 
                    user, familyId, familyName, role, personalCredits, personalTotalEarned, familyPot, familyGoal, familyGoalAmount, visibleTasks, potLogs, tab, successMsg, todayEarned, potentialLoss,
                    potPercentage: computed(() => Math.min(Math.round((familyPot.value / (familyGoalAmount.value || 1)) * 100), 100)),
                    getContributionType, getTimeSince, isOnCooldown,
                    getRank: (t) => t >= 1500 ? 'Mythic' : t >= 700 ? 'Legend' : t >= 300 ? 'Elite' : t >= 100 ? 'Soldier' : 'Rookie',
                    getRankColor: (t) => t >= 1500 ? 'text-pink-400' : t >= 700 ? 'text-yellow-400' : t >= 300 ? 'text-purple-400' : t >= 100 ? 'text-green-400' : 'text-slate-400',
                    logout: () => auth.signOut().then(() => location.reload()),
                    isCompletedToday: (t) => t.lastCompletedDate ? isSameDay(now(), t.lastCompletedDate.toDate()) : false,
                    
                    claimTask: async (t) => {
                        const email = user.value.email.toLowerCase();
                        const me = memberListDetails.value.find(x => x.email.toLowerCase() === email);
                        if (!me) return;
                        try {
                            await db.runTransaction(async (transaction) => {
                                const taskRef = db.collection('tasks').doc(t.id);
                                const doc = await transaction.get(taskRef);
                                const data = doc.data();
                                if (data.status !== 'active') throw "Unavailable";
                                const contributors = data.contributors || [];
                                if (contributors.some(c => c.email === email)) throw "In";
                                if (data.rewardType === 'familiepot' && contributors.length >= (data.requiredContributors || 1)) throw "Full";
                                
                                transaction.update(taskRef, {
                                    contributors: [...contributors, { email, memberId: me.id, joinedAt: firebase.firestore.Timestamp.now() }],
                                    status: (data.rewardType === 'familiepot' && (contributors.length + 1) >= (data.requiredContributors || 1)) || data.rewardType !== 'familiepot' ? 'pending' : 'active',
                                    completedBy: data.rewardType !== 'familiepot' ? email : null,
                                    claimedAt: firebase.firestore.Timestamp.now()
                                });
                            });
                            triggerSuccess("Success: Mission Updated");
                        } catch (e) {
                            if (e === "Full") triggerSuccess("Squad is vol");
                            else if (e === "In") triggerSuccess("Je zit al in deze missie");
                            else triggerSuccess("Missie niet beschikbaar");
                        }
                    },

                    approveTask: async (t) => {
                        const taskRef = db.collection('tasks').doc(t.id);
                        const familyRef = db.collection('families').doc(familyId.value);
                        let core=0, assist=0, late=0;
                        try {
                            await db.runTransaction(async (transaction) => {
                                const taskSnap = await transaction.get(taskRef);
                                const familySnap = await transaction.get(familyRef);
                                const taskData = taskSnap.data();
                                if (taskData.status !== 'pending') throw "Processed";
                                const contributors = taskData.contributors || [];
                                const sorted = [...contributors].sort((a,b) => a.joinedAt.toDate() - b.joinedAt.toDate());
                                const firstJoinTime = sorted[0].joinedAt.toDate().getTime();

                                for (const c of contributors) {
                                    const mRef = db.collection('families').doc(familyId.value).collection('members').doc(c.memberId);
                                    const mSnap = await transaction.get(mRef);
                                    if (!mSnap.exists) continue;

                                    const delta = c.joinedAt.toDate().getTime() - firstJoinTime;
                                    const type = delta <= 30000 ? 'core' : delta <= 60000 ? 'assist' : 'late';
                                    if(type === 'core') core++; else if(type === 'assist') assist++; else late++;
                                    
                                    const isLeader = type === 'core' && core >= 2 && c.email === sorted[0].email;
                                    const roleMult = taskData.rewardType === 'familiepot' ? (type === 'core' ? (isLeader ? 1.1 : 1.0) : (type === 'assist' ? 0.75 : 0.5)) : 1.0;
                                    const coins = taskData.rewardType === 'familiepot' ? (type === 'core' ? (isLeader ? 5 : 3) : 1) : taskData.tokens;

                                    transaction.update(mRef, { 
                                        credits: firebase.firestore.FieldValue.increment(coins),
                                        totalEarned: firebase.firestore.FieldValue.increment(Math.round(taskData.tokens * roleMult))
                                    });

                                    // CRITICAL LOGGING
                                    transaction.set(db.collection('families').doc(familyId.value).collection('potLogs').doc(), {
                                        type: 'MISSION', userEmail: c.email, amount: coins, timestamp: firebase.firestore.Timestamp.now(), description: taskData.title
                                    });
                                }

                                if (taskData.rewardType === 'familiepot') {
                                    const efficiency = contributors.length ? (core / contributors.length) : 0;
                                    transaction.update(familyRef, { familyPot: firebase.firestore.FieldValue.increment(Math.round(taskData.tokens * efficiency)) });
                                }
                                transaction.update(taskRef, { status: 'completed', contributors: [], lastCompletedDate: firebase.firestore.Timestamp.now(), streak: (taskData.streak || 0) + 1 });
                            });
                            const rating = core >= 2 ? 'STRONG TEAMPLAY' : assist > core ? 'LATE SUPPORT' : 'LOW SYNC';
                            triggerSuccess(`🔥${core} ⚡${assist} | ${rating}`);
                        } catch (e) { console.error(e); }
                    },
                    rejectTask: async (t) => await db.collection('tasks').doc(t.id).update({ status: 'active', completedBy: null, contributors: [] }),
                    getRarityClass: (t) => t >= 21 ? 'card-legendary' : t >= 11 ? 'card-epic' : t >= 6 ? 'card-uncommon' : 'card-common',
                    getRarityName: (t) => t >= 21 ? 'Legend' : t >= 11 ? 'Epic' : t >= 6 ? 'Rare' : 'Common'
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
