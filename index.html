<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gezins Hub: Battle Pass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --common: #b1b1b1; --uncommon: #43c034; --epic: #b233f0; --legendary: #f0ad1d; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .fortnite-font { font-weight: 800; text-transform: uppercase; letter-spacing: -0.01em; }
        .card-common { background: linear-gradient(135deg, #374151 0%, #111827 100%); border-top: 4px solid var(--common); }
        .card-uncommon { background: linear-gradient(135deg, #064e3b 0%, #022c22 100%); border-top: 4px solid var(--uncommon); }
        .card-epic { background: linear-gradient(135deg, #581c87 0%, #2e1065 100%); border-top: 4px solid var(--epic); }
        .card-legendary { 
            background: linear-gradient(135deg, #78350f 0%, #451a03 100%); 
            border-top: 4px solid var(--legendary); 
            position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(240, 173, 29, 0.4);
        }
        .card-legendary::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: rotate(45deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { margin-left: -100%; } 100% { margin-left: 100%; } }
        .card-completed, .card-expired { background: #1e293b !important; border-top: 4px solid #475569 !important; opacity: 0.6; filter: grayscale(1); }
        .tab-active { background-color: #2563eb !important; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4); }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="min-h-screen flex flex-col max-w-md mx-auto pb-24 px-4">
        
        <div v-if="!user" class="flex-1 flex flex-col items-center justify-center space-y-8 py-12">
            <div class="text-center">
                <h1 class="fortnite-font text-5xl italic tracking-tighter mb-2">SQUAD HUB</h1>
                <p class="text-blue-400 font-bold uppercase tracking-[0.3em] text-xs">Battle Pass System</p>
            </div>
            <button @click="login" class="w-full bg-white text-black py-4 rounded-2xl fortnite-font text-sm shadow-xl active:scale-95 transition-all">LOG IN MET GOOGLE</button>
        </div>

        <template v-if="user && familyId">
            <header class="py-6 flex justify-between items-center">
                <div class="flex flex-col">
                    <h1 class="fortnite-font text-2xl italic tracking-tighter italic">BATTLE PASS</h1>
                    <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">{{ familyName }}</p>
                </div>
                <button @click="logout" class="text-slate-500 text-[10px] font-black bg-slate-800 px-3 py-1 rounded-lg uppercase">Quit</button>
            </header>

            <section class="mb-6 space-y-4">
                <div @click="role !== 'admin' ? showBalanceActionModal = true : null" 
                     class="bg-slate-900/80 p-6 rounded-[2rem] border border-white/5 shadow-2xl transition-all"
                     :class="role !== 'admin' ? 'cursor-pointer active:scale-95' : ''">
                    <p class="fortnite-font text-[10px] text-yellow-400 tracking-widest mb-2">{{ role === 'admin' ? 'Total Squad Credits' : 'Mijn Goudvoorraad' }}</p>
                    <p class="fortnite-font text-5xl text-yellow-400 leading-none">{{ role === 'admin' ? totalOutstandingCredits : personalCredits }} 🪙</p>
                </div>

                <div @click="showPotLogs = true" class="bg-blue-600/10 p-5 rounded-[2rem] border border-blue-500/20 shadow-xl cursor-pointer">
                    <div class="flex justify-between items-center mb-2 text-blue-400">
                        <span class="fortnite-font text-[10px] italic">Squad Target: {{ familyGoal || 'Geen doel' }}</span>
                        <span class="fortnite-font text-[10px]">🪙 {{ familyPot }} / {{ familyGoalAmount }}</span>
                    </div>
                    <div class="w-full h-4 bg-slate-900 rounded-full overflow-hidden border border-blue-900/30 p-1">
                        <div class="h-full rounded-full bg-blue-500 transition-all duration-1000 shadow-[0_0_10px_rgba(59,130,246,0.5)]" :style="{ width: Math.min((familyPot / (familyGoalAmount || 1)) * 100, 100) + '%' }"></div>
                    </div>
                </div>
            </section>

            <nav class="flex gap-2 mb-6">
                <button @click="tab = 'tasks'" :class="tab === 'tasks' ? 'tab-active' : 'bg-slate-800'" class="flex-1 py-3 rounded-xl fortnite-font text-xs">Missions</button>
                <button @click="tab = 'members'" :class="tab === 'members' ? 'tab-active' : 'bg-slate-800'" class="flex-1 py-3 rounded-xl fortnite-font text-xs">Squad</button>
            </nav>

            <main class="flex-1">
                <div v-if="tab === 'tasks'" class="space-y-4">
                    <button v-if="role === 'admin'" @click="openCreateModal" class="w-full bg-white text-black py-4 rounded-2xl fortnite-font text-sm mb-6 shadow-xl">+ NEW MISSION</button>
                    
                    <div v-for="t in visibleTasks" :key="t.id" 
                         :class="[getRarityClass(t.tokens), t.status === 'completed' ? 'card-completed' : '', (isTaskExpired(t) && t.status === 'active') ? 'card-expired' : '']" 
                         class="p-5 rounded-2xl border-t-4 flex flex-col gap-4 relative shadow-xl">
                        
                        <div v-if="role === 'admin' && t.status === 'pending'" class="absolute -top-3 left-1/2 -translate-x-1/2 bg-yellow-400 text-black fortnite-font text-[9px] px-4 py-1 rounded-full shadow-xl animate-bounce border-2 border-black whitespace-nowrap z-10">
                            CLAIMED BY {{ t.completedByName }} - APPROVE NOW
                        </div>

                        <div class="flex justify-between items-start">
                            <div @click="role === 'admin' ? openEditModal(t) : null" :class="role === 'admin' ? 'cursor-pointer' : ''" class="flex-1">
                                <span class="text-[9px] font-black uppercase opacity-60 mb-1 block tracking-widest">
                                    {{ getRarityName(t.tokens) }} • {{ t.type }}
                                    <span v-if="t.type !== 'once' && t.type !== 'daily'"> ({{ daysShort[t.selectedDay || 0] }})</span>
                                    <span v-if="t.assignedToName" class="text-blue-400"> • {{ t.assignedToName }}</span>
                                </span>
                                <h3 class="fortnite-font text-lg leading-tight">{{ t.title }}</h3>
                                
                                <div v-if="t.status === 'active' && t.deadlineTime" class="mt-2 flex items-center gap-1.5">
                                    <span class="text-[10px] font-black font-mono tracking-tighter" :class="getTimeInfo(t).urgent ? 'text-rose-500' : 'text-slate-300'">
                                        {{ getTimeInfo(t).expired ? 'FAILED / EXPIRED' : 'TIJD OVER: ' + getTimeInfo(t).formatted }}
                                    </span>
                                </div>
                                <div v-if="t.status === 'completed'" class="mt-1 text-[9px] font-black text-green-500 uppercase tracking-widest">Mission Accomplished</div>
                                <div v-if="t.status === 'pending' && role !== 'admin'" class="mt-1 text-[9px] font-black text-blue-400 uppercase italic">Secured - Under Review</div>
                            </div>
                            <div class="bg-black/30 px-3 py-1 rounded-lg flex items-center gap-1.5 h-fit">
                                <span class="fortnite-font text-sm text-white italic">{{ t.tokens }}</span>
                                <span class="text-xs">🪙</span>
                            </div>
                        </div>
                        
                        <div v-if="t.status === 'pending' && role === 'admin'" class="flex gap-2">
                            <button @click="approveTask(t)" class="flex-1 bg-green-500 py-3 rounded-xl fortnite-font text-xs">APPROVE</button>
                            <button @click="rejectTask(t)" class="flex-1 bg-rose-600 py-3 rounded-xl fortnite-font text-xs">DENY</button>
                        </div>

                        <button v-else-if="role !== 'admin' && t.status === 'active' && !isTaskExpired(t)" @click="claimTask(t)" class="bg-white text-black py-3 rounded-xl fortnite-font text-xs uppercase italic active:scale-95 shadow-xl">Complete Mission</button>
                    </div>
                </div>

                <div v-if="tab === 'members'" class="space-y-6">
                    <div v-for="m in memberListDetails" :key="m.email" class="bg-slate-800/60 p-4 rounded-3xl border border-slate-700/50 flex justify-between items-center">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center font-black bg-slate-700 text-blue-400">{{ m.name.charAt(0) }}</div>
                            <div @click="role === 'admin' ? editCredits(m) : null" :class="role === 'admin' ? 'cursor-pointer' : ''">
                                <p class="fortnite-font text-sm italic">{{ m.name }}</p>
                                <span class="text-[8px] font-black text-yellow-400 uppercase tracking-widest">🪙 {{ m.credits || 0 }} Gold</span>
                            </div>
                        </div>
                        <div v-if="role === 'admin'" class="flex gap-1">
                            <button @click="toggleAdmin(m.email, m.name)" class="bg-slate-700 px-2 py-2 rounded-lg text-[8px] fortnite-font uppercase" :class="adminEmails.includes(m.email.toLowerCase()) ? 'text-blue-400' : 'text-slate-400'">
                                {{ adminEmails.includes(m.email.toLowerCase()) ? 'Commander' : 'Rank' }}
                            </button>
                            <button @click="confirmDeleteMember(m)" class="bg-rose-900/30 text-rose-500 px-2 py-2 rounded-lg text-[8px] fortnite-font">Kick</button>
                        </div>
                    </div>
                    
                    <div v-if="role === 'admin'" class="bg-blue-600/10 p-6 rounded-[2.5rem] border border-blue-500/20 border-dashed mt-6">
                        <input v-model="newMemberName" placeholder="Naam" class="w-full p-4 bg-slate-900 rounded-xl font-bold mb-3 text-white text-sm outline-none border border-white/5">
                        <input v-model="newMemberEmail" placeholder="Gmail" class="w-full p-4 bg-slate-900 rounded-xl font-bold mb-3 text-white text-sm outline-none border border-white/5">
                        <button @click="addMember" class="w-full bg-blue-600 text-white py-4 rounded-xl fortnite-font text-xs uppercase shadow-lg">Join Squad</button>
                    </div>
                </div>
            </main>

            <div v-if="showCreateModal" class="fixed inset-0 z-50 flex items-center justify-center p-4">
                <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" @click="showCreateModal = false"></div>
                <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-6 relative border border-white/10 shadow-2xl overflow-y-auto max-h-[90vh]">
                    <h3 class="fortnite-font text-xl mb-6 italic text-center text-blue-400">{{ isEditing ? 'Edit Mission' : 'New Mission' }}</h3>
                    <div class="space-y-4">
                        <input v-model="newTask.title" placeholder="Mission Naam" class="w-full p-4 bg-slate-800 rounded-xl text-sm font-bold text-white outline-none">
                        
                        <div>
                            <label class="text-[9px] font-black text-blue-400 uppercase ml-2 mb-1 block">Toewijzen aan</label>
                            <select v-model="newTask.assignedTo" class="w-full p-4 bg-slate-800 rounded-xl text-sm font-bold text-white outline-none border border-white/5">
                                <option value="">Iedereen</option>
                                <option v-for="m in squadOnly" :key="m.email" :value="m.email.toLowerCase()">{{ m.name }}</option>
                            </select>
                        </div>

                        <div class="flex gap-2">
                            <input v-model.number="newTask.tokens" type="number" class="flex-1 p-4 bg-slate-800 rounded-xl text-sm font-bold text-white outline-none">
                            <select v-model="newTask.type" class="flex-1 p-4 bg-slate-800 rounded-xl text-[11px] font-bold text-white outline-none">
                                <option value="once">Once</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option>
                            </select>
                        </div>
                        <div v-if="newTask.type === 'daily'"><input v-model="newTask.deadlineTime" type="time" class="w-full p-4 bg-slate-800 rounded-xl font-bold text-white outline-none"></div>
                        <div v-if="newTask.type === 'weekly' || newTask.type === 'monthly'" class="grid grid-cols-4 gap-2">
                            <button v-for="(day, idx) in daysShort" :key="idx" @click="newTask.selectedDay = idx" :class="newTask.selectedDay === idx ? 'bg-blue-600' : 'bg-slate-800 opacity-40'" class="py-2 rounded-lg text-[9px] font-black uppercase">{{ day }}</button>
                        </div>
                        <select v-model="newTask.rewardType" class="w-full p-4 bg-slate-800 rounded-xl text-sm font-bold text-white outline-none border border-white/5">
                            <option value="persoonlijk">Personal Gold</option><option value="familiepot">Squad Pot</option>
                        </select>
                        <div class="flex gap-2 pt-4">
                            <button v-if="isEditing" @click="deleteTask(newTask.id)" class="flex-1 bg-rose-900/50 text-rose-500 py-4 rounded-xl fortnite-font text-xs uppercase">Delete</button>
                            <button @click="saveTask" class="flex-[2] bg-blue-600 text-white py-4 rounded-xl fortnite-font text-sm uppercase">Deploy</button>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGSSTZivu3OfKjdR-61BNy0WlXFeH9C80",
            authDomain: "familyreward-c4582.firebaseapp.com",
            projectId: "familyreward-c4582",
            storageBucket: "familyreward-c4582.firebasestorage.app",
            messagingSenderId: "500697306700",
            appId: "1:500697306700:web:e812d2b9891c4d2f64c6e9"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const user = ref(null); const familyId = ref(null); const familyName = ref(''); const role = ref('user');
                const personalCredits = ref(0); const familyPot = ref(0); const familyGoal = ref(''); const familyGoalAmount = ref(100);
                const memberListDetails = ref([]); const adminEmails = ref([]); const activeTasks = ref([]); const paydayRequests = ref([]);
                const potLogs = ref([]); const tab = ref('tasks');
                const showCreateModal = ref(false); const isEditing = ref(false);
                const currentTime = ref(new Date()); const daysShort = ['Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za', 'Zo'];
                const newTask = ref({ title: '', tokens: 10, type: 'once', rewardType: 'persoonlijk', selectedDay: 0, deadlineTime: '', assignedTo: '' });
                const newMemberName = ref(''); const newMemberEmail = ref('');

                setInterval(() => { currentTime.value = new Date(); }, 1000);

                const squadOnly = computed(() => memberListDetails.value.filter(m => !adminEmails.value.includes(m.email.toLowerCase())));

                const totalOutstandingCredits = computed(() => {
                    if (!memberListDetails.value.length) return 0;
                    return memberListDetails.value
                        .filter(m => !adminEmails.value.includes(m.email.toLowerCase()))
                        .reduce((sum, m) => sum + (m.credits || 0), 0);
                });

                const visibleTasks = computed(() => {
                    const now = new Date(); const dayOfWeek = (now.getDay() + 6) % 7;
                    const myEmail = user.value?.email?.toLowerCase();
                    return activeTasks.value.filter(t => {
                        if (role.value === 'admin') return true;
                        
                        // Targeting Filter
                        if (t.assignedTo && t.assignedTo !== myEmail) return false;

                        if (t.type === 'once' || t.type === 'daily') return true;
                        const taskDate = (t.nextAvailable && t.nextAvailable.toDate) ? t.nextAvailable.toDate() : null;
                        if (t.type === 'weekly') return dayOfWeek === (t.selectedDay || 0);
                        if (t.type === 'monthly') {
                            if (!taskDate) return dayOfWeek === (t.selectedDay || 0);
                            return now.getTime() >= taskDate.getTime() && dayOfWeek === (t.selectedDay || 0);
                        }
                        return false;
                    }).sort((a, b) => (b.tokens || 0) - (a.tokens || 0));
                });

                const isTaskExpired = (t) => {
                    if (!t.deadlineTime || t.status !== 'active') return false;
                    const [h, m] = t.deadlineTime.split(':');
                    const target = new Date(); target.setHours(parseInt(h), parseInt(m), 0, 0);
                    return currentTime.value > target;
                };

                const getTimeInfo = (t) => {
                    if (!t.deadlineTime) return { formatted: '', expired: false, urgent: false };
                    const [h, m] = t.deadlineTime.split(':');
                    const target = new Date(); target.setHours(parseInt(h), parseInt(m), 0, 0);
                    const diff = target - currentTime.value;
                    if (diff <= 0) return { formatted: '0:0:0:0', expired: true, urgent: true };
                    const d = Math.floor(diff/86400000), hrs = Math.floor((diff%86400000)/3600000), mins = Math.floor((diff%3600000)/60000), secs = Math.floor((diff%60000)/1000);
                    return { formatted: `${d}:${hrs}:${mins}:${secs}`, expired: false, urgent: diff < 3600000 };
                };

                const checkUserAccess = (u) => {
                    const email = u.email.toLowerCase();
                    db.collection('families').where('member_emails', 'array-contains', email).onSnapshot(snap => {
                        if (!snap.empty) {
                            const d = snap.docs[0]; familyId.value = d.id; const data = d.data();
                            adminEmails.value = (data.admin_emails || []).map(e => e.toLowerCase());
                            role.value = adminEmails.value.includes(email) ? 'admin' : 'user';
                            familyName.value = data.familyName; familyPot.value = data.familyPot || 0;
                            familyGoalAmount.value = data.familyGoalAmount || 100;
                            db.collection('families').doc(familyId.value).collection('members').onSnapshot(mSnap => {
                                memberListDetails.value = mSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                personalCredits.value = memberListDetails.value.find(m => m.email.toLowerCase() === email)?.credits || 0;
                            });
                            db.collection('tasks').where('familyId', '==', familyId.value).onSnapshot(tSnap => { activeTasks.value = tSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })); });
                        }
                    });
                };

                onMounted(() => { auth.onAuthStateChanged(u => { if (u) { user.value = u; checkUserAccess(u); } }); });

                return { 
                    user, familyId, familyName, role, personalCredits, familyPot, totalOutstandingCredits, memberListDetails, adminEmails, visibleTasks, tab, daysShort, showCreateModal, isEditing, newTask, newMemberName, newMemberEmail, squadOnly,
                    login: () => auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()),
                    logout: () => auth.signOut().then(() => location.reload()),
                    openCreateModal: () => { isEditing.value = false; newTask.value = { title: '', tokens: 10, type: 'once', rewardType: 'persoonlijk', selectedDay: 0, deadlineTime: '', assignedTo: '' }; showCreateModal.value = true; },
                    openEditModal: (t) => { isEditing.value = true; newTask.value = { ...t }; showCreateModal.value = true; },
                    saveTask: async () => { 
                        if (!newTask.value.title) return;
                        const data = { ...newTask.value, familyId: familyId.value };
                        if (data.assignedTo) {
                            const found = memberListDetails.value.find(m => m.email.toLowerCase() === data.assignedTo);
                            data.assignedToName = found ? found.name : '';
                            alert(`Missie toegewezen aan ${data.assignedToName}`);
                        }
                        if (isEditing.value) await db.collection('tasks').doc(newTask.value.id).update(data);
                        else await db.collection('tasks').add({ ...data, status: 'active', createdAt: new Date() });
                        showCreateModal.value = false;
                    },
                    approveTask: async (task) => { 
                        const m = memberListDetails.value.find(x => x.email.toLowerCase() === task.completedBy);
                        if (m) await db.collection('families').doc(familyId.value).collection('members').doc(m.id).update({ credits: firebase.firestore.FieldValue.increment(task.tokens) });
                        if (task.type === 'once') await db.collection('tasks').doc(task.id).delete();
                        else await db.collection('tasks').doc(task.id).update({ status: 'completed', completedBy: null });
                    },
                    deleteTask: async (id) => { if (confirm("Mission annuleren?")) { await db.collection('tasks').doc(id).delete(); showCreateModal.value = false; } },
                    claimTask: async (t) => await db.collection('tasks').doc(t.id).update({ status: 'pending', completedBy: user.value.email.toLowerCase(), completedByName: user.value.displayName.split(' ')[0] }),
                    rejectTask: async (t) => await db.collection('tasks').doc(t.id).update({ status: 'active', completedBy: null }),
                    toggleAdmin: async (email, name) => { 
                        const mail = email.toLowerCase(); 
                        if (adminEmails.value.includes(mail)) {
                            await db.collection('families').doc(familyId.value).update({ admin_emails: firebase.firestore.FieldValue.arrayRemove(mail) });
                            alert(`${name} is nu een Recruit`);
                        } else {
                            await db.collection('families').doc(familyId.value).update({ admin_emails: firebase.firestore.FieldValue.arrayUnion(mail) });
                            alert(`${name} is nu een Officer (Commander)`);
                        }
                    },
                    addMember: async () => { /* Add logic */ },
                    getTimeInfo, isTaskExpired, getRarityClass: (t) => t >= 21 ? 'card-legendary' : t >= 11 ? 'card-epic' : t >= 6 ? 'card-uncommon' : 'card-common', getRarityName: (t) => t >= 21 ? 'Legendary' : t >= 11 ? 'Epic' : t >= 6 ? 'Uncommon' : 'Common'
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
