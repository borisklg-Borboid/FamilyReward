<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQUAD HUB</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; }
.card { background:#1e293b; padding:16px; border-radius:16px; }
[v-cloak]{display:none;}
</style>
</head>

<body>
<div id="app" v-cloak class="max-w-md mx-auto p-4">

<!-- LOGIN -->
<div v-if="!user" class="text-center mt-20">
    <button @click="login" class="bg-white text-black px-6 py-3 rounded-xl">
        Login met Google
    </button>
</div>

<!-- APP -->
<div v-if="user && familyId">

    <h1 class="text-xl mb-4">SQUAD HUB</h1>

    <!-- BALANCE -->
    <div class="card mb-4">
        <p>Saldo</p>
        <h2 class="text-3xl">{{ credits }} 🪙</h2>
    </div>

    <!-- ACTIONS -->
    <div class="grid grid-cols-2 gap-2 mb-4">
        <button @click="boost" class="bg-blue-500 p-3 rounded-xl">Boost</button>
        <button @click="cashout" class="bg-yellow-500 p-3 rounded-xl">Cashout</button>
    </div>

    <!-- POT -->
    <div class="card mb-4">
        <p>Family Pot</p>
        <h2 class="text-2xl">{{ familyPot }} 🪙</h2>
    </div>

    <!-- TASKS -->
    <div class="space-y-2">
        <div v-for="t in tasks" :key="t.id" class="card">
            <p>{{ t.title }} ({{ t.tokens }} 🪙)</p>

            <button v-if="t.status==='active'" @click="claimTask(t)" class="bg-white text-black px-3 py-1 rounded">
                Klaar
            </button>

            <div v-if="role==='admin' && t.status==='pending'" class="flex gap-2 mt-2">
                <button @click="approveTask(t)" class="bg-green-500 px-2">OK</button>
                <button @click="rejectTask(t)" class="bg-red-500 px-2">X</button>
            </div>
        </div>
    </div>

</div>

<!-- DEBUG -->
<div v-if="user && !familyId" class="text-red-400 mt-10">
    Geen family gevonden...
</div>

</div>

<script>
window.onerror = function (msg, url, line, col, error) {
    console.error("GLOBAL ERROR:", msg, error);
};

const firebaseConfig = {
    apiKey: "AIzaSy...",
    authDomain: "familyreward-c4582.firebaseapp.com",
    projectId: "familyreward-c4582"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

const { createApp, ref, onMounted } = Vue;

createApp({
setup() {

const user = ref(null);
const familyId = ref(null);
const role = ref('user');

const credits = ref(0);
const familyPot = ref(0);
const tasks = ref([]);

const login = () => {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
};

const init = async (u) => {
    console.log("INIT USER", u.uid);

    const q = await db.collection('families')
        .where('member_uids', 'array-contains', u.uid)
        .get();

    if (q.empty) {
        console.log("CREATING FAMILY");

        await db.collection('families').doc(u.uid).set({
            member_uids:[u.uid],
            admin_uids:[u.uid],
            familyPot:0
        });

        await db.collection('families').doc(u.uid)
            .collection('members').doc(u.uid)
            .set({ credits:0 });

        familyId.value = u.uid;
        role.value = 'admin';

    } else {
        familyId.value = q.docs[0].id;

        const data = q.docs[0].data();
        role.value = data.admin_uids.includes(u.uid) ? 'admin':'user';
    }

    listen();
};

const listen = () => {
    const fRef = db.collection('families').doc(familyId.value);

    fRef.onSnapshot(s=>{
        familyPot.value = s.data()?.familyPot || 0;
    });

    fRef.collection('members').doc(user.value.uid)
        .onSnapshot(s=>{
            credits.value = s.data()?.credits || 0;
        });

    fRef.collection('tasks')
        .onSnapshot(s=>{
            tasks.value = s.docs.map(d=>({id:d.id,...d.data()}));
        });
};

const boost = async () => {
    const val = parseInt(prompt("Hoeveel?"));
    if (!val || val <=0) return;

    try {
        await db.runTransaction(async tx=>{
            const fRef = db.collection('families').doc(familyId.value);
            const mRef = fRef.collection('members').doc(user.value.uid);

            tx.update(mRef,{credits:firebase.firestore.FieldValue.increment(-val)});
            tx.update(fRef,{familyPot:firebase.firestore.FieldValue.increment(val)});
        });

    } catch(e){
        console.error(e);
    }
};

const cashout = async () => {
    const val = credits.value;
    if (val <=0) return;

    await db.collection('families')
        .doc(familyId.value)
        .collection('members')
        .doc(user.value.uid)
        .update({
            credits:0,
            pendingPayout:val
        });
};

const claimTask = async (t) => {
    await db.collection('families')
        .doc(familyId.value)
        .collection('tasks')
        .doc(t.id)
        .update({
            status:'pending',
            claimedByUid:user.value.uid
        });
};

const approveTask = async (t) => {
    const fRef = db.collection('families').doc(familyId.value);

    await db.runTransaction(async tx=>{
        const mRef = fRef.collection('members').doc(t.claimedByUid);

        tx.update(mRef,{
            credits:firebase.firestore.FieldValue.increment(t.tokens)
        });

        tx.update(fRef.collection('tasks').doc(t.id),{
            status:'active',
            claimedByUid:null
        });
    });
};

const rejectTask = async (t) => {
    await db.collection('families')
        .doc(familyId.value)
        .collection('tasks')
        .doc(t.id)
        .update({
            status:'active',
            claimedByUid:null
        });
};

onMounted(()=>{
    auth.onAuthStateChanged(u=>{
        console.log("AUTH:",u);
        if (u){
            user.value = u;
            init(u);
        }
    });
});

return {
    user, familyId, role,
    credits, familyPot, tasks,
    login, boost, cashout,
    claimTask, approveTask, rejectTask
};

}
}).mount('#app');
</script>

</body>
</html>
