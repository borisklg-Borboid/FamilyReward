<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQUAD HUB V4 - STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --daily: #4ade80; --weekly: #60a5fa; --monthly: #a855f7; --once: #f87171; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .fortnite-font { font-weight: 800; text-transform: uppercase; letter-spacing: -0.01em; }
        .card-active { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(255,255,255,0.05); }
        .card-pending { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #eab308; box-shadow: 0 0 15px rgba(234, 179, 8, 0.2); }
        .card-cooldown { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        .type-daily { color: var(--daily); } .type-weekly { color: var(--weekly); } .type-monthly { color: var(--monthly); } .type-once { color: var(--once); }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="min-h-screen flex flex-col max-w-md mx-auto pb-24 px-4">
        
        <div v-if="successMsg" class="fixed inset-x-0 top-10 z-[100] flex justify-center px-4 pointer-events-none text-center">
            <div class="bg-blue-600 text-white fortnite-font px-6 py-4 rounded-2xl shadow-2xl animate-bounce border-2 border-white/20 uppercase italic text-sm">
                {{ successMsg }}
            </div>
        </div>

        <template v-if="user && familyId">
            <header class="py-6 flex justify-between items-center border-b border-white/5 mb-4">
                <div class="flex flex-col">
                    <h1 class="fortnite-font text-2xl italic tracking-tighter leading-none">SQUAD HUB</h1>
                    <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">{{ familyName }}</p>
                </div>
                <button @click="logout" class="text-slate-500 text-[10px] font-black bg-slate-800/50 px-3 py-1 rounded-lg uppercase">Quit</button>
            </header>

            <section class="mb-6 space-y-4">
                <div @click="showStats = !showStats" class="bg-slate-900 p-6 rounded-[2rem] border border-white/5 shadow-2xl text-yellow-400 cursor-pointer active:scale-[0.98] transition-all">
                    <div class="flex justify-between items-center mb-1 text-[10px] font-black uppercase opacity-60">
                        <span>Vault</span>
                        <span :class="getRankColor(personalTotalEarned)" class="italic">{{ getRank(personalTotalEarned) }}</span>
                    </div>
                    <div class="flex justify-between items-end">
                        <p class="fortnite-font text-5xl leading-none italic">{{ personalCredits }} 🪙</p>
                        <div v-if="pendingPayout > 0" class="text-[9px] text-yellow-500 font-black uppercase italic animate-pulse text-right leading-none">
                             ⏳ Gereserveerd:<br>{{ pendingPayout }} 🪙
                        </div>
                    </div>
                    <div v-if="showStats" class="mt-4 pt-4 border-t border-white/5 grid grid-cols-2 gap-4">
                        <div v-for="s in stats" :key="s.label">
                            <p class="text-[8px] font-black uppercase text-slate-500">{{ s.label }}</p>
                            <p class="fortnite-font text-sm text-white">{{ s.value }} {{ s.type === 'XP' ? '⭐' : '🪙' }}</p>
                        </div>
                    </div>
                </div>

                <div v-if="role === 'admin' && anyPendingPayouts" class="bg-yellow-500/10 border border-yellow-500/20 p-4 rounded-2xl space-y-2 shadow-xl">
                    <p class="text-[8px] font-black uppercase text-yellow-500 mb-1">Verify Cash Outs:</p>
                    <div v-for="m in pendingPayoutList" :key="m.id" class="flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5">
                        <span class="text-[10px] font-black uppercase tracking-tighter">{{ m.name }}: {{ m.pendingPayout }} 🪙</span>
                        <button @click="confirmPayout(m)" class="bg-green-500 text-white text-[9px] font-black px-4 py-1.5 rounded-lg uppercase italic shadow-md active:scale-90">Verify</button>
                    </div>
                </div>

                <div v-if="role !== 'admin'" class="grid grid-cols-2 gap-3">
                    <button @click="handleBoost" 
                            :disabled="personalCredits <= 0"
                            class="bg-blue-600 text-white fortnite-font text-[10px] py-3 rounded-xl uppercase italic shadow-lg active:scale-95 disabled:opacity-30 transition-all">🤝 Boost Squad</button>
                    <button v-if="!pendingPayout" @click="handlePayoutRequest" class="bg-yellow-500 text-black fortnite-font text-[10px] py-3 rounded-xl uppercase italic shadow-lg active:scale-95 transition-all">💸 Cash Out</button>
                </div>

                <div class="bg-blue-600/10 p-5 rounded-[2rem] border border-blue-500/20">
                    <div class="flex justify-between items-center mb-2 text-blue-400 text-[10px] fortnite-font">
                        <span class="italic uppercase tracking-widest">🎯 {{ familyGoal || 'Squad Objective' }}</span>
                        <span>{{ familyPot }} / {{ familyGoalAmount }} 🪙</span>
                    </div>
                    <div class="w-full h-2.5 bg-slate-900 rounded-full border border-blue-900/30 p-0.5 overflow-hidden">
                        <div class="h-full rounded-full bg-blue-500 transition-all duration-1000 shadow-[0_0_8px_rgba(59,130,246,0.5)]" :style="{ width: potPercentage + '%' }"></div>
                    </div>
                    <p class="text-[9px] text-slate-400 mt-2 italic font-bold uppercase tracking-tight">
                        Nog {{ Math.max(0, familyGoalAmount - familyPot) }} 🪙 tot de loot!
                    </p>
                </div>
            </section>

            <main class="flex-1 pb-10 space-y-4">
                <div v-for="t in sortedTasks" :key="t.id" 
                     :class="[t.status === 'pending' ? 'card-pending' : 'card-active', isTaskLocked(t) ? 'card-cooldown' : '']" 
                     class="p-5 rounded-2xl border-t-4 bg-slate-900/50 flex flex-col gap-4 relative shadow-xl transition-all">
                    
                    <div v-if="t.status === 'pending'" class="absolute -top-3 left-1/2 -translate-x-1/2 bg-yellow-400 text-black fortnite-font text-[9px] px-4 py-1 rounded-full shadow-xl border-2 border-black uppercase italic animate-pulse">Wacht op leader</div>

                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span :class="'type-' + t.type" class="text-[9px] font-black uppercase tracking-widest">{{ t.type }}</span>
                                <span v-if="(t.streak || 0) > 0 && !isTaskLocked(t)" class="text-[9px] font-black text-orange-400 italic">🔥 {{ t.streak }}</span>
                            </div>
                            <h3 class="fortnite-font text-lg leading-tight">{{ t.title }}</h3>
                        </div>
                        <div class="bg-black/30 px-3 py-1 rounded-lg flex items-center gap-1.5 h-fit text-white border border-white/5">
                            <span class="fortnite-font text-sm italic">{{ t.tokens }}</span>
                            <span class="text-xs">🪙</span>
                        </div>
                    </div>
                    
                    <div v-if="t.status === 'pending' && role === 'admin'" class="flex gap-2">
                        <button @click="approveTask(t)" class="flex-1 bg-green-500 py-3 rounded-xl fortnite-font text-xs uppercase font-black italic shadow-lg">Verify</button>
                        <button @click="rejectTask(t)" class="flex-1 bg-rose-600 py-3 rounded-xl fortnite-font text-xs uppercase font-black italic shadow-lg">Deny</button>
                    </div>
                    <button v-else-if="role !== 'admin' && t.status === 'active' && !isTaskLocked(t)" 
                            @click="claimTask(t)" 
                            class="bg-white text-black py-3 rounded-xl fortnite-font text-xs uppercase font-black italic active:scale-95 shadow-xl transition-all">Klaar!</button>
                </div>
            </main>
        </template>

        <div v-else-if="user" class="h-screen flex items-center justify-center p-12 text-center flex-col text-slate-500">
             <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500 mb-4"></div>
             <p class="fortnite-font text-sm italic uppercase tracking-widest">Loading Intel...</p>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAGSSTZivu3OfKjdR-61BNy0WlXFeH9C80", authDomain: "familyreward-c4582.firebaseapp.com", projectId: "familyreward-c4582", storageBucket: "familyreward-c4582.firebasestorage.app", messagingSenderId: "500697306700", appId: "1:500697306700:web:e812d2b9891c4d2f64c6e9" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(); const auth = firebase.auth(); const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const user = ref(null); const familyId = ref(null); const familyName = ref(''); const role = ref('user');
                const personalCredits = ref(0); const personalTotalEarned = ref(0); const pendingPayout = ref(0);
                const familyPot = ref(0); const familyGoal = ref(''); const familyGoalAmount = ref(100);
                const activeTasks = ref([]); const potLogs = ref([]); const memberListDetails = ref([]);
                const successMsg = ref(''); const currentTime = ref(new Date()); const showStats = ref(false);

                // Helper Functies
                const triggerSuccess = (msg) => { successMsg.value = msg; setTimeout(() => successMsg.value = '', 4500); };
                const isTaskLocked = (t) => t.nextAvailableAt && currentTime.value < t.nextAvailableAt.toDate();
                const getRank = (t) => t >= 1500 ? 'Mythic' : t >= 700 ? 'Legend' : t >= 300 ? 'Elite' : t >= 100 ? 'Active' : 'Rookie';
                const getRankColor = (t) => t >= 1500 ? 'text-pink-500' : t >= 700 ? 'text-yellow-500' : t >= 300 ? 'text-purple-500' : 'text-blue-400';

                const initListeners = (fid, u) => {
                    const fRef = db.collection('families').doc(fid);
                    fRef.onSnapshot(snap => {
                        if (!snap.exists || !(snap.data().member_uids || []).includes(u.uid)) {
                            localStorage.removeItem('familyId'); location.reload(); return;
                        }
                        const d = snap.data();
                        familyPot.value = d.familyPot || 0;
                        familyGoalAmount.value = d.familyGoalAmount || 100;
                        familyGoal.value = d.familyGoal || '';
                        familyName.value = d.familyName || 'Mijn Squad';
                    });
                    fRef.collection('members').doc(u.uid).onSnapshot(s => {
                        const d = s.data(); if (!d) return;
                        personalCredits.value = d.credits || 0;
                        personalTotalEarned.value = d.totalEarned || 0;
                        pendingPayout.value = d.pendingPayout || 0;
                    });
                    fRef.collection('tasks').onSnapshot(s => activeTasks.value = s.docs.map(d => ({ id: d.id, ...d.data() })));
                    fRef.collection('potLogs').where('userId', '==', u.uid).orderBy('timestamp', 'desc').limit(50).onSnapshot(s => potLogs.value = s.docs.map(d => d.data()));
                    fRef.collection('members').onSnapshot(s => memberListDetails.value = s.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                };

                const checkUserAccess = async (u) => {
                    const cachedId = localStorage.getItem('familyId');
                    if (cachedId) {
                        familyId.value = cachedId; initListeners(cachedId, u);
                        const snap = await db.collection('families').doc(cachedId).get();
                        role.value = (snap.data()?.admin_uids || []).includes(u.uid) ? 'admin' : 'user';
                        return;
                    }
                    const q = await db.collection('families').where('member_uids', 'array-contains', u.uid).get();
                    if (!q.empty) {
                        const fDoc = q.docs[0];
                        familyId.value = fDoc.id; localStorage.setItem('familyId', fDoc.id);
                        role.value = (fDoc.data().admin_uids || []).includes(u.uid) ? 'admin' : 'user';
                        initListeners(fDoc.id, u); return;
                    }
                    const newFamilyRef = db.collection('families').doc(u.uid);
                    await newFamilyRef.set({
                        familyName: "Mijn Squad", createdAt: firebase.firestore.Timestamp.now(), createdBy: u.uid,
                        member_uids: [u.uid], admin_uids: [u.uid], familyPot: 0, familyGoal: "Squad Goal 🎯", familyGoalAmount: 100
                    });
                    await newFamilyRef.collection('members').doc(u.uid).set({
                        uid: u.uid, name: u.displayName || u.email.split('@')[0], credits: 0, totalEarned: 0, pendingPayout: 0
                    });
                    familyId.value = newFamilyRef.id; localStorage.setItem('familyId', newFamilyRef.id);
                    role.value = 'admin'; initListeners(newFamilyRef.id, u);
                };

                onMounted(() => {
                    auth.onAuthStateChanged(u => { if (u) { user.value = u; checkUserAccess(u); } });
                    setInterval(() => currentTime.value = new Date(), 60000);
                });

                return {
                    user, familyId, familyName, role, personalCredits, personalTotalEarned, familyPot, familyGoalAmount, familyGoal,
                    successMsg, showStats, pendingPayout,
                    getRank, getRankColor, isTaskLocked,
                    stats: computed(() => {
                        const startOfDay = new Date(currentTime.value).setHours(0,0,0,0);
                        return [
                            { 
                                label: 'Vandaag verdiend', 
                                // ✅ VERBETERDE GUARD VOOR TIMESTAMP
                                value: potLogs.value
                                    .filter(l => l.category === 'MISSION' && l.timestamp && l.timestamp.toDate && l.timestamp.toDate() >= startOfDay)
                                    .reduce((a,c)=>a+c.amount,0), 
                                type: 'COIN' 
                            },
                            { label: 'Totaal XP', value: personalTotalEarned.value, type: 'XP' },
                            { label: 'Huidige Rank', value: getRank(personalTotalEarned.value), type: 'STR' }
                        ];
                    }),
                    anyPendingPayouts: computed(() => memberListDetails.value.some(m => m.pendingPayout > 0)),
                    pendingPayoutList: computed(() => memberListDetails.value.filter(m => m.pendingPayout > 0)),
                    potPercentage: computed(() => Math.min(Math.round((familyPot.value / (familyGoalAmount.value || 1)) * 100), 100)),
                    sortedTasks: computed(() => [...activeTasks.value].sort((a,b) => {
                        if (a.status === 'pending' && b.status !== 'pending') return -1;
                        if (b.status === 'pending' && a.status !== 'pending') return 1;
                        const aL = isTaskLocked(a); const bL = isTaskLocked(b);
                        if (!aL && bL) return -1; if (aL && !bL) return 1;
                        return (b.tokens || 0) - (a.tokens || 0);
                    })),
                    logout: () => { localStorage.removeItem('familyId'); auth.signOut().then(() => location.reload()); },
                    handleBoost: async () => {
                        const amt = window.prompt(`Boost: Hoeveel 🪙? (Saldo: ${personalCredits.value})`);
                        const val = parseInt(amt);
                        if (!val || val <= 0 || val > personalCredits.value) return;
                        try {
                            await db.runTransaction(async (tx) => {
                                const fRef = db.collection('families').doc(familyId.value);
                                const mRef = fRef.collection('members').doc(user.value.uid);
                                const snap = await tx.get(mRef);
                                if (snap.data().credits < val) throw "insufficient";
                                tx.update(mRef, { credits: firebase.firestore.FieldValue.increment(-val) });
                                tx.update(fRef, { familyPot: firebase.firestore.FieldValue.increment(val) });
                                tx.set(fRef.collection('potLogs').doc(), {
                                    userId: user.value.uid, amount: val, category: 'BOOST', timestamp: firebase.firestore.Timestamp.now(), description: 'Squad Boost'
                                });
                            });
                            triggerSuccess(`+${val} 🪙 naar squad 🚀`);
                        } catch (e) { triggerSuccess("Boost mislukt"); }
                    },
                    handlePayoutRequest: async () => {
                        const val = personalCredits.value;
                        if (val < 10) return triggerSuccess("Min. 10 🪙 nodig");
                        await db.runTransaction(async (tx) => {
                            const mRef = db.collection('families').doc(familyId.value).collection('members').doc(user.value.uid);
                            const snap = await tx.get(mRef);
                            if (snap.data().credits < val) throw "error";
                            tx.update(mRef, { credits: 0, pendingPayout: val });
                        });
                        triggerSuccess("Cash Out gereserveerd 💸");
                    },
                    confirmPayout: async (member) => {
                        await db.runTransaction(async (tx) => {
                            const mRef = db.collection('families').doc(familyId.value).collection('members').doc(member.id);
                            const fRef = db.collection('families').doc(familyId.value);
                            const snap = await tx.get(mRef);
                            const amount = snap.data().pendingPayout;
                            if (!amount || amount <= 0) throw "invalid"; 
                            tx.update(mRef, { pendingPayout: 0 });
                            tx.set(fRef.collection('potLogs').doc(), {
                                userId: member.id, amount: -amount, category: 'PAYDAY', timestamp: firebase.firestore.Timestamp.now(), description: 'Cash Out'
                            });
                        });
                        triggerSuccess("Payday geverifieerd! 💸");
                    },
                    approveTask: async (t) => {
                        await db.runTransaction(async (tx) => {
                            const tRef = db.collection('families').doc(familyId.value).collection('tasks').doc(t.id);
                            const fRef = db.collection('families').doc(familyId.value);
                            const tSnap = await tx.get(tRef);
                            const taskData = tSnap.data();
                            if (taskData.status !== 'pending') throw "processed";
                            const mRef = fRef.collection('members').doc(taskData.claimedByUid);
                            let streak = taskData.streak || 0;
                            const last = taskData.lastCompletedDate?.toDate();
                            const limit = taskData.type === 'daily' ? 86400000 : taskData.type === 'weekly' ? 604800000 : 2419200000;
                            if (last && (new Date() - last) > limit * 1.5) streak = 0;
                            streak++;
                            const xpGain = Math.round(3 + taskData.tokens * 0.4 + Math.pow(streak, 1.2));
                            const nextAt = new Date(); nextAt.setHours(0,0,0,0);
                            if (taskData.type === 'daily') nextAt.setDate(nextAt.getDate() + 1);
                            tx.update(mRef, { credits: firebase.firestore.FieldValue.increment(taskData.tokens), totalEarned: firebase.firestore.FieldValue.increment(xpGain) });
                            tx.set(fRef.collection('potLogs').doc(), { userId: taskData.claimedByUid, amount: taskData.tokens, category: 'MISSION', timestamp: firebase.firestore.Timestamp.now(), description: taskData.title });
                            tx.update(tRef, { status: taskData.type === 'once' ? 'completed' : 'active', lastCompletedDate: firebase.firestore.Timestamp.now(), nextAvailableAt: nextAt, streak, claimedByUid: null });
                        });
                        triggerSuccess("Geverifieerd!");
                    },
                    claimTask: async (t) => {
                        if (t.status !== 'active') return; 
                        await db.collection('families').doc(familyId.value).collection('tasks').doc(t.id).update({ status: 'pending', claimedByUid: user.value.uid, claimedAt: firebase.firestore.Timestamp.now() });
                        triggerSuccess("Ingezonden ✔");
                    },
                    rejectTask: (t) => db.collection('families').doc(familyId.value).collection('tasks').doc(t.id).update({ status: 'active', claimedByUid: null }),
                    getNextAvailableText: (t) => t.nextAvailableAt ? t.nextAvailableAt.toDate().toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'}) : '00:00'
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
